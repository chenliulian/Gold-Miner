<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <!-- Gradients -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="componentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bfdbfe;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#f1f5f9"/>

  <!-- Title -->
  <rect x="20" y="20" width="1160" height="60" rx="12" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="600" y="58" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="white">GoldMiner 前端架构图</text>

  <!-- Main Container -->
  <rect x="20" y="100" width="1160" height="780" rx="16" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>

  <!-- Left Sidebar Section -->
  <rect x="40" y="120" width="220" height="720" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="150" y="150" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#1e293b">📁 Sidebar 侧边栏</text>

  <!-- Sidebar Components -->
  <rect x="55" y="170" width="190" height="50" rx="8" fill="url(#componentGrad)" stroke="#94a3b8" stroke-width="1"/>
  <text x="150" y="200" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">Logo &amp; 品牌标识</text>

  <rect x="55" y="235" width="190" height="50" rx="8" fill="url(#componentGrad)" stroke="#94a3b8" stroke-width="1"/>
  <text x="150" y="260" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">➕ 新建对话按钮</text>
  <text x="150" y="275" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b">startNewChat()</text>

  <rect x="55" y="300" width="190" height="80" rx="8" fill="url(#componentGrad)" stroke="#94a3b8" stroke-width="1"/>
  <text x="150" y="325" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">📜 历史会话列表</text>
  <text x="150" y="345" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b">loadHistoryList()</text>
  <text x="150" y="360" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b">renderSessionList()</text>
  <text x="150" y="375" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b">deleteSession()</text>

  <rect x="55" y="395" width="190" height="100" rx="8" fill="url(#componentGrad)" stroke="#94a3b8" stroke-width="1"/>
  <text x="150" y="420" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">🧭 导航菜单</text>
  <text x="150" y="440" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b">对话 / 技能 / 记忆 / 学习</text>
  <text x="150" y="460" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b">switchPage()</text>
  <text x="150" y="480" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b">loadSkills() / loadMemory()</text>

  <rect x="55" y="510" width="190" height="60" rx="8" fill="url(#componentGrad)" stroke="#94a3b8" stroke-width="1"/>
  <text x="150" y="535" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">👤 用户信息区</text>
  <text x="150" y="555" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b">用户头像 / 名称 / 退出</text>

  <!-- Main Content Area -->
  <rect x="280" y="120" width="580" height="720" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="570" y="150" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#1e293b">💬 Main Content 主内容区</text>

  <!-- Header -->
  <rect x="295" y="170" width="550" height="50" rx="8" fill="url(#componentGrad)" stroke="#94a3b8" stroke-width="1"/>
  <text x="420" y="200" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">Header: 页面标题 + 操作按钮</text>

  <!-- Chat Container -->
  <rect x="295" y="235" width="550" height="350" rx="8" fill="white" stroke="#94a3b8" stroke-width="1"/>
  <text x="570" y="260" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#334155">Chat Container 消息容器</text>

  <!-- Message Types -->
  <rect x="310" y="280" width="240" height="80" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="430" y="305" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#1e40af">用户消息 (User)</text>
  <text x="430" y="325" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#3b82f6">appendMessage('user')</text>
  <text x="430" y="345" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#3b82f6">Markdown 渲染</text>

  <rect x="570" y="280" width="260" height="140" rx="6" fill="#f3e8ff" stroke="#c084fc" stroke-width="1"/>
  <text x="700" y="305" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#6b21a8">AI 消息 (Assistant)</text>
  <text x="700" y="330" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#9333ea">appendMessage('assistant')</text>
  <text x="700" y="350" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#9333ea">流式响应处理</text>
  <text x="700" y="370" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#9333ea">SQL 代码高亮</text>
  <text x="700" y="390" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#9333ea">formatSQL() / copySql()</text>

  <!-- SQL Block Detail -->
  <rect x="310" y="380" width="240" height="80" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="430" y="405" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#92400e">SQL 代码块组件</text>
  <text x="430" y="425" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#b45309">语法高亮 · 复制按钮</text>
  <text x="430" y="445" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#b45309">折叠/展开 · toggleSql()</text>

  <!-- Input Area -->
  <rect x="295" y="600" width="550" height="100" rx="8" fill="white" stroke="#94a3b8" stroke-width="1"/>
  <text x="570" y="625" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#334155">Input Area 输入区域</text>
  
  <rect x="310" y="640" width="380" height="45" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="500" y="668" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#475569">Textarea 输入框 (auto-resize)</text>

  <rect x="705" y="640" width="60" height="45" rx="6" fill="#4f46e5" stroke="#4338ca" stroke-width="1"/>
  <text x="735" y="668" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="white">发送</text>

  <rect x="775" y="640" width="60" height="45" rx="6" fill="#dc2626" stroke="#b91c1c" stroke-width="1"/>
  <text x="805" y="668" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="white">取消</text>

  <!-- Other Pages -->
  <rect x="295" y="715" width="170" height="110" rx="6" fill="#ecfdf5" stroke="#34d399" stroke-width="1"/>
  <text x="380" y="740" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#065f46">Skills Page</text>
  <text x="380" y="760" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#059669">loadSkills()</text>
  <text x="380" y="780" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#059669">loadTables()</text>
  <text x="380" y="805" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#059669">技能列表 / 数据表</text>

  <rect x="480" y="715" width="170" height="110" rx="6" fill="#fdf4ff" stroke="#e879f9" stroke-width="1"/>
  <text x="565" y="740" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#86198f">Memory Page</text>
  <text x="565" y="765" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#c026d3">loadMemory()</text>
  <text x="565" y="790" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#c026d3">长期记忆数据</text>
  <text x="565" y="810" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#c026d3">记忆管理</text>

  <rect x="665" y="715" width="180" height="110" rx="6" fill="#fff7ed" stroke="#fb923c" stroke-width="1"/>
  <text x="755" y="740" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#9a3412">Learnings Page</text>
  <text x="755" y="765" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#ea580c">loadLearnings()</text>
  <text x="755" y="790" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#ea580c">学习记录 / 错误日志</text>
  <text x="755" y="810" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#ea580c">持续改进数据</text>

  <!-- State Management Section -->
  <rect x="880" y="120" width="280" height="350" rx="12" fill="url(#stateGrad)" stroke="#3b82f6" stroke-width="2"/>
  <text x="1020" y="150" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#1e40af">🗄️ State Management</text>
  <text x="1020" y="170" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#3b82f6">状态管理 (JavaScript)</text>

  <rect x="895" y="190" width="250" height="80" rx="6" fill="white" stroke="#60a5fa" stroke-width="1"/>
  <text x="1020" y="215" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#1e40af">Global State</text>
  <text x="1020" y="235" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b">currentSessionId</text>
  <text x="1020" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b">currentPage (chat/skills/memory)</text>
  <text x="1020" y="265" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b">sessionStates (Map)</text>

  <rect x="895" y="285" width="250" height="80" rx="6" fill="white" stroke="#60a5fa" stroke-width="1"/>
  <text x="1020" y="310" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#1e40af">Session State</text>
  <text x="1020" y="330" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b">isProcessing (是否处理中)</text>
  <text x="1020" y="345" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b">abortController (取消控制)</text>
  <text x="1020" y="360" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b">messages[] (消息历史)</text>

  <rect x="895" y="380" width="250" height="75" rx="6" fill="white" stroke="#60a5fa" stroke-width="1"/>
  <text x="1020" y="405" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#1e40af">Helper Functions</text>
  <text x="1020" y="425" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b">getSessionState()</text>
  <text x="1020" y="440" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b">setSessionProcessing()</text>

  <!-- API Layer Section -->
  <rect x="880" y="490" width="280" height="350" rx="12" fill="url(#apiGrad)" stroke="#f59e0b" stroke-width="2"/>
  <text x="1020" y="520" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#92400e">🔌 API Layer</text>
  <text x="1020" y="540" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#b45309">后端通信接口</text>

  <rect x="895" y="560" width="250" height="60" rx="6" fill="white" stroke="#fbbf24" stroke-width="1"/>
  <text x="1020" y="585" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#92400e">Session APIs</text>
  <text x="1020" y="605" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#b45309">GET /sessions | POST /sessions/new</text>

  <rect x="895" y="630" width="250" height="60" rx="6" fill="white" stroke="#fbbf24" stroke-width="1"/>
  <text x="1020" y="655" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#92400e">Chat API (流式)</text>
  <text x="1020" y="675" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#b45309">POST /chat (stream: true)</text>

  <rect x="895" y="700" width="250" height="60" rx="6" fill="white" stroke="#fbbf24" stroke-width="1"/>
  <text x="1020" y="725" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#92400e">Control API</text>
  <text x="1020" y="745" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#b45309">POST /interrupt | Auth APIs</text>

  <rect x="895" y="770" width="250" height="55" rx="6" fill="white" stroke="#fbbf24" stroke-width="1"/>
  <text x="1020" y="790" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#92400e">Data APIs</text>
  <text x="1020" y="810" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#b45309">/skills | /memory | /learnings</text>

  <!-- Note: Connection lines removed for cleaner view -->
  <text x="1190" y="670" font-family="Inter, Arial, sans-serif" font-size="11" fill="#dc2626">Backend</text>

  <!-- Legend -->
  <rect x="40" y="850" width="400" height="40" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="55" y="875" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#334155">图例:</text>
  
  <rect x="110" y="860" width="20" height="15" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="135" y="872" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b">UI 组件</text>
  
  <rect x="200" y="860" width="20" height="15" rx="3" fill="url(#stateGrad)" stroke="#3b82f6" stroke-width="1"/>
  <text x="225" y="872" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b">状态管理</text>
  
  <rect x="310" y="860" width="20" height="15" rx="3" fill="url(#apiGrad)" stroke="#f59e0b" stroke-width="1"/>
  <text x="335" y="872" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b">API 接口</text>

  <!-- File Info -->
  <text x="600" y="885" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#94a3b8">文件: ui/templates/index.html | 总代码行数: ~2743 行</text>
</svg>