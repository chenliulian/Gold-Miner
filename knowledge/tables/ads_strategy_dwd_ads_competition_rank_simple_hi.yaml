使用场景:
  - 分析广告组竞价排名分布情况
  - 评估广告在不同代码位的竞价竞争力
  - 计算竞胜率和各排名位次占比
  - 分析不同国家的竞价表现
  - 对比不同包名的排名分布差异
  - 注意: 所有数值字段为STRING类型，需CAST转换后计算
常用查询场景:
  广告组竞价排名分析:
    场景名称: 广告组竞价排名分布统计
    SQL模板: |
      SELECT 
        country_name,
        code_seat_title,
        SUM(CAST(recall_nums AS BIGINT)) AS recall_cnt,
        SUM(CAST(rank_nums AS BIGINT)) AS rank_cnt,
        SUM(CAST(resp_nums AS BIGINT)) AS resp_cnt,
        SUM(CAST(pos1_nums AS BIGINT)) AS pos1_cnt,
        SUM(CAST(pos2_nums AS BIGINT)) AS pos2_cnt,
        SUM(CAST(pos3_nums AS BIGINT)) AS pos3_cnt,
        ROUND(SUM(CAST(resp_nums AS BIGINT)) * 100.0 / 
              NULLIF(SUM(CAST(rank_nums AS BIGINT)), 0), 2) AS win_rate,
        ROUND(SUM(CAST(pos1_nums AS BIGINT)) * 100.0 / 
              NULLIF(SUM(CAST(resp_nums AS BIGINT)), 0), 2) AS pos1_pct
      FROM ads_strategy.dwd_ads_competition_rank_simple_hi
      WHERE dh >= '{start_dh}' AND dh <= '{end_dh}'
        AND ad_group_id = '{ad_group_id}'
      GROUP BY country_name, code_seat_title
      ORDER BY resp_cnt DESC
      LIMIT 100
    关键字段:
      - ad_group_id: 广告组ID
      - country_name: 国家名称
      - code_seat_title: 代码位名称
      - recall_nums: 召回次数
      - rank_nums: 参与排名次数
      - resp_nums: 响应次数
      - pos1_nums: 第1位次数
    注意事项:
      - 所有数值字段需CAST为BIGINT后计算
      - 竞胜率 = resp_nums / rank_nums
      - 第1位占比 = pos1_nums / resp_nums
