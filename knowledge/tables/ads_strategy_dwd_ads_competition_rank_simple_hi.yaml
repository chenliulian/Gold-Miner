ETL代码: |
  insert OVERWRITE table dwd_ads_competition_rank_simple_hi PARTITION (dh="${dh}") 
  SELECT 
      ad_group_id 
      ,package_name 
      ,national_id 
      ,t1.code_seat_id 
      ,sum(recall_nums) recall_nums 
      ,sum(rank_nums) rank_nums 
      ,sum(resp_nums) resp_nums 
      ,sum(pos1_nums) pos1_nums 
      ,sum(pos2_nums) pos2_nums 
      ,sum(pos3_nums) pos3_nums 
      ,sum(pos4_nums) pos4_nums 
      ,sum(pos5_nums) pos5_nums 
      ,code_seat_title 
      ,country_name 
  from ( 
      select ad_group_id 
          ,package_name 
          ,national_id 
          ,code_seat_id 
          ,recall_nums 
          ,rank_nums 
          ,resp_nums 
          ,pos1_nums 
          ,pos2_nums 
          ,pos3_nums 
          ,pos4_nums 
          ,pos5_nums 
          from ads_strategy.dwd_ads_competition_rank_hi where dh="${dh}" 
  ) t1 
     JOIN    ( 
              SELECT  sid 
                      ,title code_seat_title 
              FROM    com_cdm.dim_code_seat_dd 
              WHERE   dt = MAX_PT('com_cdm.dim_code_seat_dd') 
          ) t2 
  ON      t1.code_seat_id = t2.sid 
  join ( 
      select code_seat_id, SUM(bill_should_cost) AS adcost 
      FROM    com_ads.ads_tracker_ad_cpc_cost_hi 
      where dh >= '${pre_3_dt}' 
      and substr(advertiser_dh, 1, 8) = '${pre_1_dt}' 
      group by code_seat_id 
      order by SUM(bill_should_cost) desc 
      limit 50 
  ) t3 on t1.code_seat_id = t3.code_seat_id 
  join ( 
      select item_code, item_name country_name 
      from com_ods.ods_advertiser_member_option_item_dd 
      where dt = '${pre_1_dt}' 
  ) t4 on t1.national_id = t4.item_code 
  group by 
      ad_group_id 
      ,package_name 
      ,national_id 
      ,t1.code_seat_id 
      ,code_seat_title 
      ,country_name 
  ;

