建表语句: |
  create table if not exists dwd_ads_competition_rank_simple_hi 
  ( 
      ad_group_id  STRING comment '广告组ID', 
      package_name STRING comment '投放包名', 
      national_id  STRING comment '国家ID', 
      code_seat_id STRING comment '代码位ID', 
      recall_nums  STRING comment '召回量', 
      rank_nums    STRING comment '进精排量', 
      resp_nums    STRING comment '响应量', 
      pos1_nums    STRING comment '排名第一位的响应量', 
      pos2_nums    STRING comment '排名第二位的响应量', 
      pos3_nums    STRING comment '排名第三位的响应量', 
      pos4_nums    STRING comment '排名第四位的响应量', 
      pos5_nums    STRING comment '排名第五位的响应量', 
      code_seat_title string comment '代码位名称', 
      country_name  string comment '国家中文名' 
  ) 
  COMMENT "广告竞价排名简表" 
  PARTITIONED by ( 
      dh              STRING COMMENT "yyyymmddhh，法兰克福时间" 
  ) 
  LIFECYCLE 100;
