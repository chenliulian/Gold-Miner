数据生产逻辑:
  概述: |
    本表统计广告竞价过程中的排名分布情况，追踪广告从召回到最终响应的转化漏斗。
    数据粒度为广告创意+广告组+包名+国家+代码位+小时，用于分析广告竞价竞争力和排名表现。
  
  输入数据源:
    - com_ods.ods_creativity_adaptation_creativity_index: 创意索引表，获取创意与广告组、包名的映射关系
    - ads_strategy.dwd_ew_request_sample_hi: 竞价请求采样表，包含竞价各阶段的请求数据
  
  核心处理流程:
    阶段1_创意信息准备:
      - creative_info: 从创意索引表获取最新的创意ID、广告组ID、包名映射关系
      - 使用MAX_PT获取最新分区数据
      - 去重处理，确保创意信息唯一性
    
    阶段2_请求数据关联:
      - req_group_tb: 关联竞价请求数据与创意信息
      - 从dwd_ew_request_sample_hi获取指定小时分区数据
      - LEFT JOIN关联creative_info，补充广告组ID和包名
      - 保留字段: request_id, national_id, code_seat_id, stage, ad_creative_id, stage_rank, ad_group_id, ps_package_name
    
    阶段3_竞价排名统计:
      - 按ad_group_id, ad_creative_id, ps_package_name, national_id, code_seat_id分组聚合
      - 统计指标计算:
        * recall_nums: COUNT(DISTINCT request_id) - 召回次数（所有请求）
        * rank_nums: COUNT(DISTINCT CASE WHEN stage IN ('RESP','cnt_limit') THEN request_id END) - 进入排名阶段次数
        * resp_nums: COUNT(DISTINCT CASE WHEN stage = 'RESP' THEN request_id END) - 响应次数
        * pos1_nums: COUNT(DISTINCT CASE WHEN stage = 'RESP' AND stage_rank = 0 THEN request_id END) - 排名第1位次数
        * pos2_nums: COUNT(DISTINCT CASE WHEN stage = 'RESP' AND stage_rank = 1 THEN request_id END) - 排名第2位次数
        * pos3_nums: COUNT(DISTINCT CASE WHEN stage = 'RESP' AND stage_rank = 2 THEN request_id END) - 排名第3位次数
        * pos4_nums: COUNT(DISTINCT CASE WHEN stage = 'RESP' AND stage_rank = 3 THEN request_id END) - 排名第4位次数
        * pos5_nums: COUNT(DISTINCT CASE WHEN stage = 'RESP' AND stage_rank = 4 THEN request_id END) - 排名第5位次数
  
  输出字段生成逻辑:
    - recall_nums: 广告创意被召回参与竞价的不同请求数，反映广告参与竞价竞争的活跃度
    - rank_nums: stage为'RESP'或'cnt_limit'的不同请求数，表示进入排名阶段的请求数
    - resp_nums: stage为'RESP'的不同请求数，表示成功响应的竞价次数
    - pos1_nums~pos5_nums: stage为'RESP'且stage_rank分别为0~4的不同请求数，表示排名第1~5位的次数
    - stage_rank从0开始计数，0表示排名第1，1表示排名第2，以此类推
  
  时间参数说明:
    - ${dh}: 小时分区，格式yyyymmddhh，法兰克福时间
    - MAX_PT: 获取创意索引表的最新分区

ETL代码: |
  WITH creative_info AS 
  ( 
      SELECT  DISTINCT creativity_id id 
              ,launch_group_id ad_group_id 
              ,ps_package_name 
      FROM    com_ods.ods_creativity_adaptation_creativity_index 
      WHERE   dt = MAX_PT("com_ods.ods_creativity_adaptation_creativity_index") 
  ) 
  ,req_group_tb AS ( 
  SELECT 
      t1.request_id 
      ,t1.national_id 
      ,t1.code_seat_id 
      ,t1.stage 
      ,t1.ad_creative_id 
      ,t1.stage_rank 
      ,t2.ad_group_id 
      ,t2.ps_package_name 
  from 
      ( 
          select * from dwd_ew_request_sample_hi where dh = '${dh}' 
      ) t1 
      left JOIN creative_info t2 
      on t1.ad_creative_id = t2.id 
  ) 

  INSERT OVERWRITE TABLE dwd_ads_competition_rank_hi PARTITION (dh = "${dh}") 
  SELECT 
      ad_group_id 
      ,ad_creative_id 
      ,ps_package_name 
      ,national_id 
      ,code_seat_id 
      ,COUNT(DISTINCT request_id) recall_nums 
      ,COUNT(DISTINCT CASE    WHEN stage IN ('RESP','cnt_limit') THEN request_id 
      END) AS rank_nums 
      ,COUNT(DISTINCT CASE    WHEN stage = 'RESP' THEN request_id 
      END) AS resp_nums 
      ,COUNT(DISTINCT CASE    WHEN stage = 'RESP' AND stage_rank = 0 THEN request_id 
      END) AS resp_1 
      ,COUNT(DISTINCT CASE    WHEN stage = 'RESP' AND stage_rank = 1 THEN request_id 
      END) AS resp_2 
      ,COUNT(DISTINCT CASE    WHEN stage = 'RESP' AND stage_rank = 2 THEN request_id 
      END) AS resp_3 
      ,COUNT(DISTINCT CASE    WHEN stage = 'RESP' AND stage_rank = 3 THEN request_id 
      END) AS resp_4 
      ,COUNT(DISTINCT CASE    WHEN stage = 'RESP' AND stage_rank = 4 THEN request_id 
      END) AS resp_5 
  FROM    req_group_tb 
  group by 
      ad_group_id 
      ,ad_creative_id 
      ,ps_package_name 
      ,national_id 
      ,code_seat_id 
  ;

