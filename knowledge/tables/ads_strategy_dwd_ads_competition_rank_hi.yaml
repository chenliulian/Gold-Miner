      resp_nums    STRING, 
      pos1_nums    STRING, 
      pos2_nums    STRING, 
      pos3_nums    STRING, 
      pos4_nums    STRING, 
      pos5_nums    STRING 
  ) 
  COMMENT "广告竞价排名表" 
  PARTITIONED by ( 
      dh              STRING COMMENT "yyyymmddhh，法兰克福时间" 
  ) 
  LIFECYCLE 30;
