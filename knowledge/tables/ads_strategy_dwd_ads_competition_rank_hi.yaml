  create table if not exists dwd_ads_competition_rank_hi 
  ( 
      ad_group_id  STRING, 
      ad_creative_id STRING, 
      package_name STRING, 
      national_id  STRING, 
      code_seat_id STRING, 
      recall_nums  STRING, 
