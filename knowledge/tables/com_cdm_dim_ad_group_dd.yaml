常用查询场景:
  示例查询:
    场景名称: 查询广告组基本信息
    SQL模板: SELECT id, title, advertiser_id, ad_plan_id, transform_target_cn, status_cn
      FROM com_cdm.dim_ad_group_dd WHERE dt = MAX_PT('com_cdm.dim_ad_group_dd') AND
      id = '{{ad_group_id}}'
    参数:
      ad_group_id: 广告组ID
  示例查询2:
    场景名称: 批量查询广告组
    SQL模板: SELECT id, title, ad_plan_id, budget, transform_target_cn FROM com_cdm.dim_ad_group_dd
      WHERE dt = MAX_PT('com_cdm.dim_ad_group_dd') AND advertiser_id = '{{advertiser_id}}'
    参数:
      advertiser_id: 广告主ID
数据质量规则:
  异常值识别:
  - 规则: is_deleted = 1 的记录应为已删除广告组
  - 规则: start_time > end_time 为异常数据
  - 规则: budget <= 0 且 is_put = 1 为异常
