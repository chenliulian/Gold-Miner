常用查询场景:
  查询创意列表:
    场景名称: 查询指定条件下的创意列表
    SQL模板: |
      SELECT id, title, ad_group_id, ad_plan_id, advertiser_id, 
             material_type_cn, status_cn, open_cn, gmt_create
      FROM com_cdm.dim_creativity_dd
      WHERE dt = '${dt}'
        AND advertiser_id = '${advertiser_id}'
      LIMIT 100
    参数:
      dt: 日期分区，格式YYYYMMDD
      advertiser_id: 广告主ID

  统计创意数量:
    场景名称: 按广告主统计创意数量
    SQL模板: |
      SELECT advertiser_id, account_name, 
             COUNT(DISTINCT id) AS creativity_count
      FROM com_cdm.dim_creativity_dd
      WHERE dt = '${dt}'
      GROUP BY advertiser_id, account_name
      ORDER BY creativity_count DESC
    参数:
      dt: 日期分区，格式YYYYMMDD

数据质量规则:
  异常值识别:
    空创意标题:
      条件: title IS NULL OR title = ''
      可能原因: 数据同步异常或创意未命名
      建议: 检查数据源或联系广告主补充

    无效状态:
      条件: status NOT IN (0, 1, 2)
      可能原因: 状态码异常
      建议: 检查状态映射关系

