基本信息:
  表名: ads_strategy.dwd_ads_launch_info_dt
  业务名称: 在投广告信息变更表
  数据粒度: 广告组+包名+日
  更新频率: 日
  保留周期: 100天
  项目: ads_strategy
  列数: 49
  分区数: 1
建表语句: |
  create table if not exists dwd_ads_launch_info_dt ( 
        ad_group_id        String    Comment "广告组ID" 
        ,pkg               String    COMMENT "包名" 
        ,is_new            String    COMMENT "是否新广告" 
        ,launch_cids       String    COMMENT "在投创意数" 
        ,is_full_launch    String   COMMENT "所有广告是否24小时投放" 
        ,launch_rate       DOUBLE    COMMENT "投放率" 
        ,is_bill_change    INT    COMMENT "出价是否调整" 
        ,new_bill          DOUBLE    COMMENT "最新出价" 
        ,old_bill          Double    COMMENT "上一日出价" 
        ,bill_diff         DOUBLE    COMMENT "出价变化幅度" 
        ,not_launch_size   Array<String>    COMMENT "未投放的素材尺寸" 
        ,is_media_change   INT    COMMENT "媒体是否变化" 
        ,is_country_change   INT    COMMENT "国家是否变化" 
        ,is_crowd_change   INT    COMMENT "人群包是否变化" 
        ,is_ex_crowd_change   INT    COMMENT "排除人群包是否变化" 
        ,is_install_change   INT    COMMENT "已安装人群包是否变化" 
        ,is_ex_install_change   INT    COMMENT "排除已安装人群包是否变化" 
        ,new_media_cat_ids   STRING    COMMENT "最新投放媒体" 
        ,new_country_ids   STRING    COMMENT "最新投放国家" 
        ,new_crowd_pack_ids   STRING    COMMENT "最新投放人群包" 
        ,new_ex_crowd_pack_ids   STRING    COMMENT "最新已排除人群包" 
        ,new_install_pkg_ids   STRING    COMMENT "最新已安装人群包" 
        ,new_ex_install_pkg_ids   STRING    COMMENT "最新排出已安装人群包" 
        ,old_media_cat_ids   STRING    COMMENT "上一日投放媒体" 
        ,old_country_ids   STRING    COMMENT "上一日投放国家" 
        ,old_crowd_pack_ids   STRING    COMMENT "上一日投放人群包" 
        ,old_ex_crowd_pack_ids   STRING    COMMENT "上一日已排除人群包" 
        ,old_install_pkg_ids   STRING    COMMENT "上一日已安装人群包" 
        ,old_ex_install_pkg_ids   STRING    COMMENT "上一日排出已安装人群包" 
        ,is_seat_types_change  INT  COMMENT "广告位是否改变" 
        ,new_seat_type         Array<String>   COMMENT "最新广告位" 
        ,old_seat_type         Array<STRING>   COMMENT "上一日广告位" 
        ,is_budget_type_change  INT  COMMENT "预估类型是否改变" 
        ,is_budget_change       DOUBLE   COMMENT "预算是否调整" 
        ,old_budget_type       STRING  COMMENT "上一日预算类型" 
        ,new_budget_type       STRING  COMMENT "最新预算类型" 
        ,old_budget            STRING  COMMENT "上一日预算" 
        ,new_budget            STRING  COMMENT "最新预算" 
        ,budget_diff           String  COMMENT "预算变化幅度" 
        ,new_crowd_pack_user_cnt bigint comment '新定向人群包用户量级' 
        ,old_crowd_pack_user_cnt bigint comment '原定向人群包用户量级' 
        ,new_ex_crowd_pack_user_cnt bigint comment '新排除人群包用户量级' 
        ,old_ex_crowd_pack_user_cnt bigint comment '原排除人群包用户量级' 
        ,is_crowd_pack_user_cnt_change int comment '定向人群包量级是否变更' 
        ,is_ex_crowd_pack_user_cnt_change int comment '排除人群包量级是否变更' 
        ,advertiser_id     int comment '广告主ID' 
        ,available_amount     double comment '账户余额' 
        ,ad_cost              double comment '账户消耗' 
        ,ext_info             string comment '扩展字段 json map' 
   ) COMMENT "在投广告信息变更表" 
   PARTITIONED by ( 
       dt STRING COMMENT "yyyymmdd" 
   ) LIFECYCLE 100;
