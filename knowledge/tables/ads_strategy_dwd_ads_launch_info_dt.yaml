数据生产逻辑:
  概述: |
    本表通过对比昨日和前天的广告索引数据，检测广告组的各项变更情况，
    包括出价、预算、定向、素材、投放状态等维度的变化。
    数据粒度为广告组+包名+日，用于广告诊断和投放分析。
  
  输入数据源:
    - ads_strategy.dwd_eagllwin_strategy_index_part_hf: 广告索引信息主表
    - com_ods.crowd_pack_advertiser: 人群包信息表
    - ads_strategy.dwd_ads_budget_info_hf: 预算信息小时表
    - ads_strategy.ads_group_budget_cost_hi: 广告组预算消耗表
    - com_ods.ods_eagllwin_fundpool_fund_pool_di: 资金池余额表
    - com_cdm.dwd_log_dsp_adserver_request_hi: DSP请求日志
    - com_ads.ads_tracker_ad_cpc_cost_hi: 点击激活统计表
    - com_ods.ods_launch_bidding_support_strategy_dd: 扶持策略表
    - ads_strategy.ads_pre_recall_abnormal_filter: 前置打压过滤表
    - ads_strategy.dwd_eagllwin_strategy_index_dup_label_hf: 重复广告标记表
    - eagllwin_full_retrieve.ods_eagllwin_index_hf: 索引原始数据表
    - com_ads.ads_codeseatid_filter_hi: 代码位过滤统计表
    - tmc_dmp.ads_labe_merger_base_hi: DMP标签基础表
    - com_cdm.dim_creative_dd: 创意维度表
    - com_cdm.dim_advertiser_account_dd: 广告主账户维度表
  
  核心处理流程:
    阶段1_数据准备:
      - tmp_launch: 从索引表获取昨日和前天的广告基础数据
      - before_yes_last_dh_sum_crowd_pack: 前天定向人群包用户量汇总
      - before_yes_last_dh_sum_excrowd_pack: 前天排除人群包用户量汇总
      - before_yes_last_dh_union: 合并前天的人群包数据
      - yes_info_sum_crowd: 昨日定向人群包用户量汇总
      - yes_info_sum_excrowd: 昨日排除人群包用户量汇总
      - yes_info_union: 合并昨日的人群包数据
    
    阶段2_变更检测:
      - bill_info: 出价变更检测（对比昨日和前天出价）
      - missing_material: 素材缺失检测（检查创意尺寸是否存在）
      - missing_material_by_media_cate_seat_type: 按媒体类型细分的素材缺失
      - other_info: 定向变更检测（媒体、国家、人群包、已安装等）
      - seat_type: 代码位类型变更检测
    
    阶段3_投放状态分析:
      - yes_launch_info_launch_hour: 投放小时统计（计算实际投放时长）
      - yes_launch_info_cids_hour: 投放创意数统计
      - yes_launch_info_quality_score: 创意质量分统计
      - yes_launch_info_restrict_recall: 前置打压标记
      - yes_launch_info_dup_creative: 重复广告标记
      - yes_launch_info_ps_search_rec: PS搜索推荐状态
      - yes_launch_info_is_new: 是否新广告组判断
      - yes_launch_info: 汇总投放状态信息（是否全天投放、投放率等）
    
    阶段4_预算和余额分析:
      - budget_tb: 预算信息表（转换时区并打序号）
      - yes_budget: 昨日预算数据（17:00-次日16:00）
      - before_yes_budget: 前天预算数据（16:00）
      - budget_info: 预算变更分析（类型变更、金额变更、变化幅度）
      - fundpool_tb: 余额相关信息（广告主消耗、账户余额、前日余额、二级行业）
    
    阶段5_召回和诊断数据:
      - tmp_recall_tbl: 离线和在线广告召回统计
      - tmp_recall_uv_tbl: 召回UV统计
      - tmp_install_pkg_tbl: 已安装数据量统计
      - tmp_traffic_restrict_nation_ids: 桌面限流国家识别
      - tmp_traffic_ssp_req_cnt: 流量波动统计
    
    阶段6_扩展信息汇总:
      - ext_info_tbl: 整合所有诊断信息到MAP（CVR、扶持系数、召回数据、预算、人群包等）
  
  输出字段生成逻辑:
    - is_new: 通过LEFT JOIN判断前天是否存在该广告组
    - is_full_launch: 根据投放小时计算（should_launch_hour > total_launch_hour）
    - launch_rate: total_launch_hour / should_launch_hour * 100
    - is_bill_change: 对比昨日和前天出价是否有变化
    - bill_diff: 最新出价 - 平均历史出价
    - is_media_change/is_country_change/is_crowd_change等: 对比定向条件是否变化
    - is_budget_type_change/is_budget_change: 对比预算类型和金额是否变化
    - budget_diff: 最新预算 - 平均历史预算
    - ext_info: MAP结构包含CVR、扶持系数、召回统计、余额、人群包等扩展信息
  
  时间参数说明:
    - ${pre_1_dt}: 昨日日期（数据日期）
    - ${pre_2_dt}: 前天日期（对比基准）
    - ${pre_3_dt}: 大前天（用于CVR计算）
    - ${pre_5_dt}: 5天前（用于预算历史数据）
    - ${cur_dt}: 当前日期

