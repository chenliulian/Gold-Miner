基本信息:
  表名: ads_strategy.dwd_ads_launch_info_dt
  业务名称: 在投广告信息变更表
  数据粒度: 广告组+包名+日
  更新频率: 日
  保留周期: 100天
  项目: ads_strategy
  列数: 49
  分区数: 1
核心字段详解:
  ad_group_id:
    字段名: ad_group_id
    数据类型: STRING
    业务含义: 广告组ID，标识广告投放的组
    示例值: ['69099']
    使用注意: 关联广告组维度表获取详细信息
  pkg:
    字段名: pkg
    数据类型: STRING
    业务含义: 应用包名，标识投放的应用
    示例值: ['com.tyou.Sweet.mi']
    使用注意: 用于筛选特定应用的投放数据
  is_new:
    字段名: is_new
    数据类型: STRING
    业务含义: 是否新广告，标识该广告组是否为新创建
    示例值: ['1']
    使用注意: '1'表示新广告，'0'表示老广告
  launch_cids:
    字段名: launch_cids
    数据类型: STRING
    业务含义: 在投创意数，当前正在投放的创意数量
    示例值: ['17']
    使用注意: 反映广告组的创意丰富度
  is_full_launch:
    字段名: is_full_launch
    数据类型: STRING
    业务含义: 所有广告是否24小时投放，标识投放时间设置
    示例值: ['0']
    使用注意: '1'表示全天投放，'0'表示分时段投放
  launch_rate:
    字段名: launch_rate
    数据类型: DOUBLE
    业务含义: 投放率，实际投放时长占24小时的百分比
    示例值: ['29.17']
    使用注意: 值越低说明投放时间越短
  is_bill_change:
    字段名: is_bill_change
    数据类型: INT
    业务含义: 出价是否调整，标识当日是否修改出价
    示例值: ['1']
    使用注意: 1表示有调整，0表示无调整
  new_bill:
    字段名: new_bill
    数据类型: DOUBLE
    业务含义: 最新出价，当前设置的出价金额
    示例值: ['0.5']
    使用注意: 单位：美元
  old_bill:
    字段名: old_bill
    数据类型: DOUBLE
    业务含义: 上一日出价，前一天设置的出价金额
