使用场景:
  - 追踪广告组投放设置的变更历史
  - 分析出价调整对投放效果的影响
  - 监控人群包、媒体、国家等定向设置的变更
  - 分析预算变更与消耗的关系
  - 评估投放时间设置（全天/分时段）对效果的影响
  - 追踪广告素材尺寸的覆盖情况
  - 监控账户余额和消耗情况
常用查询场景:
  出价变更分析:
    场景名称: 分析广告组出价调整记录
    SQL模板: |
      SELECT 
        ad_group_id,
        pkg,
        old_bill,
        new_bill,
        bill_diff,
        launch_rate,
        dt
      FROM ads_strategy.dwd_ads_launch_info_dt
      WHERE dt BETWEEN '{start_dt}' AND '{end_dt}'
        AND is_bill_change = 1
        AND ad_group_id = '{ad_group_id}'
      ORDER BY dt DESC
      LIMIT 100
    关键字段:
      - ad_group_id: 广告组ID
      - old_bill: 原出价
      - new_bill: 新出价
      - bill_diff: 出价变化幅度
      - launch_rate: 投放率
    注意事项:
      - 需关注出价调整与投放率的关系
      - 大幅提价可能影响竞胜率
  定向设置变更追踪:
    场景名称: 追踪人群包和媒体变更记录
    SQL模板: |
      SELECT 
        ad_group_id,
        pkg,
        is_media_change,
        is_country_change,
        is_crowd_change,
        new_crowd_pack_user_cnt,
        old_crowd_pack_user_cnt,
        dt
      FROM ads_strategy.dwd_ads_launch_info_dt
      WHERE dt >= '{start_dt}'
        AND (is_media_change = 1 
             OR is_country_change = 1 
             OR is_crowd_change = 1)
      ORDER BY dt DESC
      LIMIT 100
    关键字段:
      - is_media_change: 媒体变更标识
      - is_country_change: 国家变更标识
      - is_crowd_change: 人群包变更标识
      - new_crowd_pack_user_cnt: 新人群包量级
    注意事项:
      - 定向设置变更会显著影响流量规模
      - 人群包量级变化需关注覆盖度
数据质量规则:
  异常值识别:
    出价异常:
      说明: 出价应在合理范围内(0.01-100)
      检查: new_bill > 0 AND new_bill < 100
    投放率异常:
      说明: 投放率应在0-100之间
      检查: launch_rate >= 0 AND launch_rate <= 100
