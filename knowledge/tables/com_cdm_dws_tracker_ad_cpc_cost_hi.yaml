      ,conv_src                 STRING COMMENT '用于区分转化来源 1-三方、2-联运、3-表单、4-ps归因'
      ,channel                  STRING COMMENT '转化渠道'
      ,pre_download_cnt         DOUBLE COMMENT '预估广告下载数'
      ,video_play_stage         STRING COMMENT '视频播放进度 error、start、firstQuartile、midpoint、thirdQuartile、complete'
      ,video_play_pv            BIGINT COMMENT '视频播放数'
      ,ssp_id                   STRING COMMENT 'SSP ID'
      ,cpi_cost                 DOUBLE COMMENT 'cpi消耗'
      ,click_active_cnt         BIGINT COMMENT '点击时间激活数'
      ,ssp_price                DOUBLE COMMENT '外部SSP收益'
      ,correct_ssp_price        DOUBLE COMMENT '外部SSP补偿收益'
      ,res_price                DOUBLE COMMENT '响应广告ecpm出价（千次美元）'
      ,click_cpi_cost           DOUBLE COMMENT '点击时间cpi消耗'
      ,correct_bill_should_cost DOUBLE COMMENT '反作弊后 计费系统记录的应扣 - 注意！不含correct_cpm_cost'
      ,cpi_click_pred_cost      DOUBLE COMMENT 'cpi点击预估消耗'
      ,budget                   BIGINT COMMENT '日预算'
      ,bill                     DOUBLE COMMENT '出价(元)'
      ,cpi_download_pred_cost   DOUBLE COMMENT 'cpi下载预估消耗'
      ,click_conv_pv            BIGINT COMMENT '点击时间转化数'
