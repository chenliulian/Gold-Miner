基本信息:
  表名: com_cdm.dws_tracker_ad_cpc_cost_hi
  业务名称: 程序化广告请求/响应/展现点击/计费结果小时DWS汇总表
  数据粒度: 代码位+广告创意+小时
  更新频率: 小时
  保留周期: 36500天(永久)
  项目: mi_ads_dmp
  列数: 114
  分区数: 1
建表语句: |
  CREATE TABLE IF NOT EXISTS dws_tracker_ad_cpc_cost_hi
