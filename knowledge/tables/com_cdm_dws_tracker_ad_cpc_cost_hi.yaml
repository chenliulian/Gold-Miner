  COMMENT '程序化广告请求/响应/展现点击/计费结果小时dws汇总表,代码位+广告创意粒度'
  PARTITIONED BY 
  (
      dh                        STRING COMMENT '业务发生小时,GMT+8时区,格式yyyyMMddHH'
  )
  LIFECYCLE 36500;
