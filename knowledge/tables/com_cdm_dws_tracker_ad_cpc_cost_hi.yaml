常用查询场景:
  示例查询:
    场景名称: 按小时统计广告消耗
    SQL模板: SELECT dh, SUM(bill_should_cost) as cost FROM com_cdm.dws_tracker_ad_cpc_cost_hi
      WHERE dh >= '{{start_dh}}' AND dh <= '{{end_dh}}' GROUP BY dh
    参数:
      start_dh: 开始小时
      end_dh: 结束小时
