    SQL模板: SELECT dh, SUM(bill_should_cost) as cost FROM com_cdm.dws_tracker_ad_cpc_cost_hi WHERE dh >= '{{start_dh}}' AND dh <= '{{end_dh}}' GROUP BY dh
    参数:
      start_dh: 开始小时
      end_dh: 结束小时
数据质量规则:
  异常值识别: {}

数据生产逻辑:
  概述: |
    本表是程序化广告的核心DWS汇总表，汇总了请求、响应、展现、点击、计费等多阶段数据。
    数据粒度为代码位+广告创意+小时，支持多维度的广告效果分析和计费结算。
    数据来源于多个DWD层表，经过关联维度表和计算收益后形成。
  
  输入数据源:
    - com_cdm.dws_dsp_adserver_request_hi: DSP请求小时表，提供请求数据
    - com_cdm.dws_dsp_adserver_response_hi: DSP响应小时表，提供响应数据
    - com_cdm.dws_dsp_adserver_show_hi: DSP展现小时表，提供展现数据
    - com_cdm.dws_dsp_adserver_click_hi: DSP点击小时表，提供点击数据
    - com_cdm.dws_dsp_adserver_billing_hi: DSP计费小时表，提供计费数据
    - com_cdm.dws_dsp_adserver_cpd_hi: CPD计费小时表
    - com_cdm.dws_dsp_adserver_cpi_hi: CPI计费小时表
    - com_cdm.dim_creativity_dd: 创意维度表
    - com_cdm.dim_ad_group_dd: 广告组维度表
    - com_cdm.dim_ad_plan_dd: 计划维度表
    - com_cdm.dim_advertiser_account_dd: 广告主账户维度表
    - com_cdm.dim_code_seat_dd: 代码位维度表
    - com_cdm.dim_media_app_dd: 媒体应用维度表
    - com_cdm.dim_media_account_dd: 媒体账户维度表
    - com_cdm.dim_media_commission_ratio_dd: 媒体分成比例维度表
    - com_cdm.dim_pub_mcc_and_region_info: MCC区域信息维度表
    - com_cdm.dim_country_info: 国家信息维度表
    - com_cdm.dim_pkg_app_all_di: 应用包名维度表
  
  核心处理流程:
    阶段1_数据准备(多源数据UNION):
      - stat_request: 从dws_dsp_adserver_request_hi获取请求数据
      - stat_response: 从dws_dsp_adserver_response_hi获取响应数据
      - stat_show: 从dws_dsp_adserver_show_hi获取展现数据
      - stat_click: 从dws_dsp_adserver_click_hi获取点击数据
      - stat_billing: 从dws_dsp_adserver_billing_hi获取计费数据
      - stat_cpd: 从dws_dsp_adserver_cpd_hi获取CPD数据
      - stat_cpi: 从dws_dsp_adserver_cpi_hi获取CPI数据
      - 以上数据通过UNION ALL合并
    
    阶段2_数据聚合(reduce_info):
      - 按所有维度字段GROUP BY汇总
      - 计算请求数、响应数、展现数、点击数、消耗等核心指标
      - 处理补偿数据(correct_前缀字段)
    
    阶段3_维度关联:
      - 关联创意维度表(dim_creativity_dd)获取创意信息
      - 关联广告组维度表(dim_ad_group_dd)获取广告组信息
      - 关联计划维度表(dim_ad_plan_dd)获取计划信息
      - 关联广告主维度表(dim_advertiser_account_dd)获取广告主信息
      - 关联代码位维度表(dim_code_seat_dd)获取代码位信息
      - 关联媒体应用维度表(dim_media_app_dd)获取应用信息
      - 关联媒体账户维度表(dim_media_account_dd)获取媒体信息
    
    阶段4_收益计算:
      - 关联分成比例维度表(dim_media_commission_ratio_dd)
      - 按代码位、应用、媒体三个层级计算分成比例
      - 计算媒体主收益(cpm_income/cpc_income/cpd_income)
      - 公式: 广告主花费 * 分成比例 / 100
      - 外部SSP流量(ad_type=4)特殊处理
    
    阶段5_补充维度:
      - 关联MCC区域信息表获取国家信息
      - 关联国家信息表获取中文国家名和洲名
      - 关联应用包名表获取应用分类
      - 处理品牌名称标准化
  
  输出字段生成逻辑:
    - advertiser_id~third_industry: 来自广告主维度表
    - ad_plan_id~purpose_type_cn: 来自计划维度表
    - ad_group_id~ad_group_title: 来自广告组维度表
    - creativity_id~creativity_title: 来自创意维度表
    - media_id~media_company_name: 来自媒体维度表
    - app_id~app_name: 来自媒体应用维度表
    - code_seat_id~code_seat_type_cn: 来自代码位维度表
    - country~continent: 来自MCC和国家维度表
    - cpm_income/cpc_income/cpd_income: 广告主花费 * 分成比例
    - brand: 标准化处理后的品牌名称
    - 其他指标字段: 来自各DWS源表的SUM聚合
  
  时间参数说明:
    - ${startdt_gmt8}: 开始日期(GMT+8)
    - ${enddt_gmt8}: 结束日期(GMT+8)
    - dh: 小时分区，格式yyyyMMddHH，GMT+8时区

