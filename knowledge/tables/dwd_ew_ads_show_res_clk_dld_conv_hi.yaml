# 表业务知识定义
# 表名: mi_ads_dmp.dwd_ew_ads_show_res_clk_dld_conv_hi
# 用途: 广告展示点击转化明细表

基本信息:
  表名: mi_ads_dmp.dwd_ew_ads_show_res_clk_dld_conv_hi
  业务名称: 广告展示点击转化明细表
  数据粒度: 单次广告曝光级别（一行代表一次广告展示）
  更新频率: 小时级（T+1小时）
  保留周期: 90天
  数据量级: 百亿级（每天数亿条）
  所属项目: mi_ads_dmp
  表类型: DWD（明细层）

分区信息:
  分区字段: dh
  分区类型: STRING
  分区格式: YYYYMMDDHH
  分区示例: "2026031500 表示 2026年3月15日0点"
  查询要求: 必须指定dh范围，否则查询会被拒绝

核心字段详解:
  # ========== 时间字段 ==========
  dh:
    字段名: dh
    数据类型: STRING
    业务含义: 数据小时分区
    格式说明: YYYYMMDDHH，如 2026031500
    使用注意: >
      查询时必须指定dh范围。
      范围格式: dh >= '2026031500' AND dh <= '2026031523'。
      单次查询建议不超过7天。
    示例值: "2026031500, 2026031523"
    
  # ========== 实体ID字段 ==========
  advertiser_id:
    字段名: advertiser_id
    数据类型: BIGINT
    业务含义: 广告主唯一标识
    关联表: dim_advertiser (广告主维度表)
    使用场景: 按广告主分析、筛选特定广告主
    示例值: "12345678"
    查询示例: WHERE advertiser_id = 12345678
    
  campaign_id:
    字段名: campaign_id
    数据类型: BIGINT
    业务含义: 广告计划ID
    层级关系: 广告主 > 广告计划 > 广告组 > 创意
    使用场景: 按广告计划分析
    示例值: "987654321"
    
  adgroup_id:
    字段名: adgroup_id
    数据类型: BIGINT
    业务含义: 广告组ID
    层级关系: 广告计划 > 广告组 > 创意
    使用场景: 按广告组分析
    示例值: "456789123"
    
  creative_id:
    字段名: creative_id
    数据类型: BIGINT
    业务含义: 广告创意ID
    层级关系: 最细粒度，代表具体广告内容
    使用场景: 创意效果分析
    示例值: "789123456"
    
  request_id:
    字段名: request_id
    数据类型: STRING
    业务含义: 广告请求唯一标识
    特点: 每次广告请求生成一个唯一ID
    使用场景: 去重、追踪单次请求链路
    示例值: "abc123def456"
    
  # ========== 消耗字段 ==========
  billing_actual_deduction_price:
    字段名: billing_actual_deduction_price
    数据类型: BIGINT
    业务含义: 实际扣费金额（微美元）
    单位: 微美元 (1美元 = 1,000,000微美元)
    计算公式: billing_actual_deduction_price / 1e5
    重要提示: >
      这是实际扣费，不是出价。
      单位是微美元，需要转换。
      用于计算真实消耗。
    示例值: "50000 (表示0.5美元)"
    常用计算: >
      总消耗: SUM(billing_actual_deduction_price) / 1e5
      平均CPM: SUM(billing_actual_deduction_price) / SUM(show_count) * 1000 / 1e5
      
  cost_type:
    字段名: cost_type
    数据类型: STRING
    业务含义: 扣费类型/出价方式
    枚举值: "CPC-按点击付费, CPM-按千次展示付费, oCPC-优化点击付费, oCPM-优化千次展示付费"
    使用场景: 按出价方式分析效果差异
    示例值: "oCPM"
    
  # ========== 展示点击字段 ==========
  show_count:
    字段名: show_count
    数据类型: BIGINT
    业务含义: 展示次数
    说明: 每行代表一次展示，所以通常是1
    计算方式: SUM(show_count) 得到总展示数
    示例值: "1"
    
  click_count:
    字段名: click_count
    数据类型: BIGINT
    业务含义: 点击次数
    说明: 如果这次展示产生了点击，值为1，否则为0
    计算方式: SUM(click_count) 得到总点击数
    示例值: "0 或 1"
    
  # ========== 转化字段 ==========
  conversion_count:
    字段名: conversion_count
    数据类型: BIGINT
    业务含义: 转化次数
    说明: 如果这次展示/点击产生了转化，值为1
    转化类型: 根据业务配置（下载、激活、注册等）
    计算方式: SUM(conversion_count) 得到总转化数
    示例值: "0 或 1"
    
  label:
    字段名: label
    数据类型: BIGINT
    业务含义: 转化标签
    说明: 标识是否转化及转化类型
    示例值: "0, 1, 2, 3"
    
  # ========== 定向相关字段 ==========
  age:
    字段名: age
    数据类型: INT
    业务含义: 用户年龄
    使用场景: 年龄定向效果分析
    示例值: "25"
    
  gender:
    字段名: gender
    数据类型: STRING
    业务含义: 用户性别
    枚举值: "M-男性, F-女性, U-未知"
    示例值: "M"
    
  region:
    字段名: region
    数据类型: STRING
    业务含义: 用户地域
    使用场景: 地域效果分析
    示例值: "北京, 上海, 广东"
    
  # ========== 广告位字段 ==========
  slot_id:
    字段名: slot_id
    数据类型: STRING
    业务含义: 广告位ID
    说明: 标识广告展示的位置
    示例值: "splash, feed, banner"
    
  media_id:
    字段名: media_id
    数据类型: BIGINT
    业务含义: 媒体ID
    说明: 标识流量来源媒体
    示例值: "12345"

常用查询场景:
  场景1_查询某小时总消耗:
    场景名称: 查询指定小时的总消耗
    适用场景: 财务结算、小时级监控
    SQL模板: >
      SELECT 
        '{biz_date}' AS biz_date,
        SUM(billing_actual_deduction_price) / 1e5 AS spend_usd
      FROM mi_ads_dmp.dwd_ew_ads_show_res_clk_dld_conv_hi
      WHERE dh >= '{biz_date}00' AND dh <= '{biz_date}23';
    参数:
      biz_date: 业务日期，格式YYYYMMDD，如 "20260315"
    返回字段: "biz_date-业务日期, spend_usd-总消耗（美元）"
      
  场景2_查询广告主消耗TOP10:
    场景名称: 查询消耗最高的10个广告主
    适用场景: 大客户分析、Top客户监控
    SQL模板: >
      SELECT 
        advertiser_id,
        SUM(billing_actual_deduction_price) / 1e5 AS spend_usd,
        SUM(show_count) AS impressions,
        SUM(click_count) AS clicks,
        ROUND(SUM(click_count) / SUM(show_count), 4) AS ctr
      FROM mi_ads_dmp.dwd_ew_ads_show_res_clk_dld_conv_hi
      WHERE dh >= '{start_date}00' AND dh <= '{end_date}23'
      GROUP BY advertiser_id
      ORDER BY spend_usd DESC
      LIMIT 10;
    参数:
      start_date: 开始日期，格式YYYYMMDD
      end_date: 结束日期，格式YYYYMMDD
    返回字段: "advertiser_id-广告主ID, spend_usd-消耗（美元）, impressions-展示数, clicks-点击数, ctr-点击率"
      
  场景3_分小时消耗趋势:
    场景名称: 查看24小时消耗趋势
    适用场景: 流量趋势分析、异常检测
    SQL模板: >
      SELECT 
        dh,
        SUM(billing_actual_deduction_price) / 1e5 AS spend_usd,
        SUM(show_count) AS impressions,
        SUM(click_count) AS clicks
      FROM mi_ads_dmp.dwd_ew_ads_show_res_clk_dld_conv_hi
      WHERE dh >= '{start_hour}' AND dh <= '{end_hour}'
      GROUP BY dh
      ORDER BY dh;
    参数:
      start_hour: 开始小时，格式YYYYMMDDHH
      end_hour: 结束小时，格式YYYYMMDDHH
    返回字段: "dh-小时, spend_usd-消耗, impressions-展示, clicks-点击"
      
  场景4_分成本类型分析:
    场景名称: 按出价方式分析效果
    适用场景: 出价策略分析
    SQL模板: >
      SELECT 
        cost_type,
        SUM(billing_actual_deduction_price) / 1e5 AS spend_usd,
        SUM(show_count) AS impressions,
        SUM(click_count) AS clicks,
        ROUND(SUM(click_count) / SUM(show_count), 4) AS ctr,
        ROUND(SUM(billing_actual_deduction_price) / SUM(show_count) * 1000 / 1e5, 2) AS cpm
      FROM mi_ads_dmp.dwd_ew_ads_show_res_clk_dld_conv_hi
      WHERE dh >= '{start_date}00' AND dh <= '{end_date}23'
      GROUP BY cost_type
      ORDER BY spend_usd DESC;
    参数:
      start_date: 开始日期
      end_date: 结束日期
    返回字段: "cost_type-出价类型, spend_usd-消耗, impressions-展示, clicks-点击, ctr-点击率, cpm-千次展示成本"

数据质量规则:
  异常值识别:
    CTR异常高:
      条件: CTR > 10%
      可能原因: 作弊流量、数据异常
      建议: 标记并进一步分析
      
    CTR异常低:
      条件: CTR < 0.1%
      可能原因: 创意质量差、定向过宽
      建议: 优化创意或调整定向
      
    消耗为0但有展示:
      条件: billing_actual_deduction_price = 0 AND show_count > 0
      可能原因: 赠送流量、数据缺失
      建议: 检查是否为赠送流量
      
    点击大于展示:
      条件: click_count > show_count
      严重级别: 高
      说明: 数据逻辑错误，需要排查

查询注意事项:
  必须指定分区:
    规则: 查询必须包含 dh 分区条件
    原因: 表数据量巨大，全表扫描会导致查询超时
    正确示例: WHERE dh >= '2026031500' AND dh <= '2026031523'
    错误示例: 没有 WHERE 条件
