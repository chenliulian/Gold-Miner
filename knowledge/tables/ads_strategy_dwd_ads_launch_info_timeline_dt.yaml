基本信息:
  表名: ads_strategy.dwd_ads_launch_info_timeline_dt
  业务名称: 在投广告信息变更表时间轴化
  数据粒度: ID(广告组/计划/广告主)+包名+操作类型
  更新频率: 日
  保留周期: 100天
  项目: ads_strategy
  列数: 5
  分区数: 1
核心字段详解:
  id_cate:
    字段名: id_cate
    数据类型: STRING
    业务含义: 对象ID，根据id_type字段表示广告组ID、计划ID或广告主ID
    示例值: ['69099', '29367', '12345']
    使用注意: 需结合id_type字段确定ID类型
  pkg:
    字段名: pkg
    数据类型: STRING
    业务含义: 应用包名，标识投放的应用
    示例值: ['com.tyou.Sweet.mi', 'com.example.app']
    使用注意: 用于筛选特定应用的变更记录
  opera_type:
    字段名: opera_type
    数据类型: STRING
    业务含义: 操作类型，标识发生的变更操作
    示例值: ['BILL_CHANGE', 'MEDIA_CHANGE', 'COUNTRY_CHANGE', 'CROWD_CHANGE', 'BUDGET_CHANGE', 'SEAT_TYPE_CHANGE', 'STATUS_CHANGE']
    使用注意: |
      常见操作类型：
      - BILL_CHANGE: 出价调整
      - MEDIA_CHANGE: 媒体变更
      - COUNTRY_CHANGE: 国家变更
      - CROWD_CHANGE: 人群包变更
      - EX_CROWD_CHANGE: 排除人群包变更
      - INSTALL_CHANGE: 已安装人群包变更
      - EX_INSTALL_CHANGE: 排除已安装人群包变更
      - BUDGET_CHANGE: 预算变更
      - SEAT_TYPE_CHANGE: 广告位变更
      - STATUS_CHANGE: 状态变更
  opera_lift:
    字段名: opera_lift
    数据类型: DOUBLE
    业务含义: 变化幅度，标识变更的量化程度
    示例值: [0.5, -0.3, 15.5]
    使用注意: |
      不同操作类型的含义：
      - BILL_CHANGE: 出价变化金额（美元）
      - BUDGET_CHANGE: 预算变化金额（美元）
      - 其他类型: 可能为1（表示有变化）或0（表示无变化）
      正值表示增加/扩大，负值表示减少/缩小
  id_type:
    字段名: id_type
    数据类型: STRING
    业务含义: ID类型，标识id_cate字段的ID类别
    示例值: ['ad_group_id', 'plan_id', 'advertiser_id']
    使用注意: |
      三种ID类型：
      - ad_group_id: 广告组ID
      - plan_id: 计划ID
      - advertiser_id: 广告主ID
使用场景:
  - 追踪广告组/计划/广告主的变更时间轴
  - 分析特定操作类型的变更频率
  - 评估出价调整的幅度分布
  - 监控定向设置（媒体/国家/人群包）的变更趋势
  - 对比不同层级的变更活跃度（广告组vs计划vs广告主）
  - 分析变更操作与投放效果的关联
常用查询场景:
  出价变更时间轴:
    场景名称: 追踪广告组出价变更历史
    SQL模板: |
      SELECT 
        id_cate AS ad_group_id,
        pkg,
        opera_type,
        opera_lift AS bill_change,
        dt
      FROM ads_strategy.dwd_ads_launch_info_timeline_dt
      WHERE dt BETWEEN '{start_dt}' AND '{end_dt}'
        AND id_type = 'ad_group_id'
        AND opera_type = 'BILL_CHANGE'
        AND id_cate = '{ad_group_id}'
      ORDER BY dt DESC
      LIMIT 100
    关键字段:
      - id_cate: 广告组ID
      - opera_type: 操作类型（BILL_CHANGE）
      - opera_lift: 出价变化幅度
      - dt: 变更日期
    注意事项:
      - opera_lift正值表示提价，负值表示降价
      - 可结合消耗数据分析出价调整效果
  定向变更统计:
    场景名称: 统计各类型定向设置的变更次数
    SQL模板: |
      SELECT 
        opera_type,
        id_type,
        COUNT(*) AS change_cnt,
        COUNT(DISTINCT id_cate) AS id_cnt,
        AVG(ABS(opera_lift)) AS avg_lift
      FROM ads_strategy.dwd_ads_launch_info_timeline_dt
      WHERE dt >= '{start_dt}'
        AND opera_type IN ('MEDIA_CHANGE', 'COUNTRY_CHANGE', 'CROWD_CHANGE', 'BUDGET_CHANGE')
      GROUP BY opera_type, id_type
      ORDER BY change_cnt DESC
    关键字段:
      - opera_type: 操作类型
      - id_type: ID类型
      - change_cnt: 变更次数
      - id_cnt: 涉及ID数量
    注意事项:
      - 可按id_type分层统计（广告组/计划/广告主）
      - avg_lift反映变更幅度大小
数据质量规则:
  异常值识别:
    操作类型异常:
      说明: opera_type应为预定义值之一
      检查: opera_type IN ('BILL_CHANGE', 'MEDIA_CHANGE', 'COUNTRY_CHANGE', 'CROWD_CHANGE', 'EX_CROWD_CHANGE', 'INSTALL_CHANGE', 'EX_INSTALL_CHANGE', 'BUDGET_CHANGE', 'SEAT_TYPE_CHANGE', 'STATUS_CHANGE')
    ID类型异常:
      说明: id_type应为预定义值之一
      检查: id_type IN ('ad_group_id', 'plan_id', 'advertiser_id')
