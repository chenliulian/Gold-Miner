常用查询场景:
  统计样本分布:
    场景名称: 统计正负样本分布
    SQL模板: |
      SELECT 
        label,
        COUNT(*) AS sample_count,
        COUNT(*) * 100.0 / SUM(COUNT(*)) OVER() AS pct
      FROM mi_ads_dmp.dwd_dld_loancvr_model_train_data_di
      WHERE dt = '${dt}'
      GROUP BY label
    参数:
      dt: 日期分区

  特征统计:
    场景名称: 统计特征分布
    SQL模板: |
      SELECT 
        AVG(a_ctr_1d) AS avg_a_ctr,
        AVG(a_cvr_1d) AS avg_a_cvr,
        AVG(price) AS avg_price,
        PERCENTILE(a_ctr_1d, 0.5) AS median_a_ctr,
        PERCENTILE(a_cvr_1d, 0.5) AS median_a_cvr
      FROM mi_ads_dmp.dwd_dld_loancvr_model_train_data_di
      WHERE dt = '${dt}'
    参数:
      dt: 日期分区

  按广告主统计:
    场景名称: 按广告主统计样本和转化率
    SQL模板: |
      SELECT 
        advertiser_id,
        COUNT(*) AS total_samples,
        SUM(label) AS positive_samples,
        SUM(label) * 1.0 / COUNT(*) AS cvr
      FROM mi_ads_dmp.dwd_dld_loancvr_model_train_data_di
      WHERE dt = '${dt}'
      GROUP BY advertiser_id
      ORDER BY total_samples DESC
      LIMIT 100
    参数:
      dt: 日期分区

  特征相关性分析:
    场景名称: 分析特征与标签的相关性
    SQL模板: |
      SELECT 
        CASE 
          WHEN a_ctr_1d < 0.02 THEN 'low'
          WHEN a_ctr_1d < 0.05 THEN 'medium'
          ELSE 'high'
        END AS ctr_bucket,
        AVG(label) AS avg_label,
        COUNT(*) AS sample_count
      FROM mi_ads_dmp.dwd_dld_loancvr_model_train_data_di
      WHERE dt = '${dt}'
      GROUP BY ctr_bucket
    参数:
      dt: 日期分区

数据质量规则:
  异常值识别:
    缺失标签:
      条件: label IS NULL
      可能原因: 数据标注延迟
      建议: 检查标注流程

    异常CTR:
      条件: a_ctr_1d > 1 OR a_ctr_1d < 0
      可能原因: 特征计算错误
      建议: 检查特征工程逻辑

    异常CVR:
      条件: a_cvr_1d > 1 OR a_cvr_1d < 0
      可能原因: 特征计算错误
      建议: 检查特征工程逻辑

    样本不均衡:
      条件: SUM(label) / COUNT(*) > 0.5 OR SUM(label) / COUNT(*) < 0.01
      可能原因: 采样策略问题
      建议: 检查正负采样比例

