常用查询场景:
  查询消耗数据:
    场景名称: 查询指定时间范围的消耗数据
    SQL模板: |
      SELECT 
        advertiser_id,
        cost_type,
        SUM(billing_actual_deduction_price) / 1e5 AS spend_cost
      FROM mi_ads_dmp.dwd_ew_ads_show_res_clk_dld_conv_hi
      WHERE dh >= '${start_dh}' AND dh <= '${end_dh}'
      GROUP BY advertiser_id, cost_type
      ORDER BY spend_cost DESC
    参数:
      start_dh: 开始小时，格式YYYYMMDDHH
      end_dh: 结束小时，格式YYYYMMDDHH

  统计转化数据:
    场景名称: 统计激活、注册、付费转化数
    SQL模板: |
      SELECT 
        advertiser_id,
        SUM(click_label) AS click_count,
        SUM(dld_label) AS dld_count,
        SUM(conv_label_active) AS active_count,
        SUM(conv_label_register) AS register_count,
        SUM(conv_label_pay) AS pay_count
      FROM mi_ads_dmp.dwd_ew_ads_show_res_clk_dld_conv_hi
      WHERE dh >= '${start_dh}' AND dh <= '${end_dh}'
      GROUP BY advertiser_id
    参数:
      start_dh: 开始小时
      end_dh: 结束小时

  计算CTR/CVR:
    场景名称: 计算广告组的CTR和CVR
    SQL模板: |
      SELECT 
        ad_group_id,
        SUM(click_label) / COUNT(*) AS ctr,
        SUM(conv_label_active) / SUM(click_label) AS cvr
      FROM mi_ads_dmp.dwd_ew_ads_show_res_clk_dld_conv_hi
      WHERE dh >= '${start_dh}' AND dh <= '${end_dh}'
        AND advertiser_id = '${advertiser_id}'
      GROUP BY ad_group_id
    参数:
      start_dh: 开始小时
      end_dh: 结束小时
      advertiser_id: 广告主ID

数据质量规则:
  异常值识别:
    负消耗:
      条件: billing_actual_deduction_price < 0
      可能原因: 数据回滚或退款
      建议: 检查是否为正常退款，否则联系数据团队

    异常CTR:
      条件: ctr > 1 OR ctr < 0
      可能原因: 模型预估异常
      建议: 检查模型输出

    缺失广告主:
      条件: advertiser_id IS NULL OR advertiser_id = ''
      可能原因: 数据同步异常
      建议: 检查上游数据源

