核心字段详解:
  request_id:
    字段名: request_id
    数据类型: STRING
    业务含义: 广告请求ID，唯一标识一次广告请求
    示例值:
    - req_20240101120000_abc123
    使用注意: 关联曝光、点击、下载、转化数据的关键字段
  trigger_id:
    字段名: trigger_id
    数据类型: STRING
    业务含义: 触发ID，标识广告触发事件
    示例值:
