基本信息:
  表名: mi_ads_dmp.dwd_ew_ads_show_res_clk_dld_conv_hi
  业务名称: 广告曝光响应点击下载转化明细小时表
  数据粒度: 曝光/点击/下载/转化事件明细
  更新频率: 小时
  保留周期: 90天
  项目: mi_ads_dmp
  列数: 115
  分区数: 1
建表语句: |
  CREATE TABLE IF NOT EXISTS dwd_ew_ads_show_res_clk_dld_conv_hi
  (
      request_id                      STRING COMMENT '广告请求ID'
      ,trigger_id                     STRING COMMENT '触发ID'
      ,show_id                        STRING COMMENT '曝光ID'
      ,is_inapp_ad                    STRING COMMENT '0/否 1/是'
      ,gaid                           STRING COMMENT '用户ID'
      ,app_id                         STRING COMMENT '应用ID'
      ,code_seat_id                   STRING COMMENT '媒体代码位id'
      ,code_seat_type                 STRING COMMENT '代码位类型=code_type'
      ,type                           INT COMMENT '设备类型'
      ,brand                          STRING COMMENT '机型品牌'
      ,model                          STRING COMMENT '客户端手机型号'
      ,maker                          STRING COMMENT '设备制造商'
      ,os_type                        STRING COMMENT '操作系统'
      ,os_version                     STRING COMMENT '操作系统版本号'
      ,language                       STRING COMMENT '语言'
      ,net_connect_type               STRING COMMENT '网络连接类型'
      ,is_default_ad                  BIGINT COMMENT '是否请求打底广告'
      ,operator_type                  INT COMMENT '运营商类型'
      ,ip_address                     STRING COMMENT '客户端ip'
      ,screen_width                   INT COMMENT '屏幕宽'
      ,screen_height                  INT COMMENT '屏幕长'
      ,screen_density                 INT COMMENT '屏幕密度'
      ,national_id                    STRING COMMENT '国家ID'
      ,state_id                       STRING COMMENT '州ID'
      ,city_id                        STRING COMMENT '城市ID'
      ,ad_creative_id                 STRING COMMENT '创意id'
      ,ad_group_id                    STRING COMMENT '广告组id'
      ,ad_plan_id                     STRING COMMENT '计划id'
      ,advertiser_id                  STRING COMMENT '广告主id'
      ,package_name                   STRING COMMENT '应用包名'
      ,ad_type                        INT COMMENT '流量类型，0 未知流量 1 api流量（媒体）2 sdk流量'
      ,page_id                        STRING COMMENT '页面ID'
      ,ssp_id                         STRING COMMENT ''
      ,popularize_app_install_status  STRING COMMENT '-1:异常情况取不到是否安装 1.非下载类广告 2.已安装目标下载应用 3.未安装目标下载应用'
      ,first_price                    DOUBLE COMMENT '竞价一价'
      ,st_ecpm                        STRING COMMENT '策略助力，单位：美分'
      ,op_ecpm                        STRING COMMENT '运营助力，单位：美分'
      ,ee_ecpm                        STRING COMMENT '流量探索，单位：美分'
      ,cul_ecpm                       STRING COMMENT '保育, 单位：美分'
      ,billing_actual_deduction_price BIGINT COMMENT '计费的扣费'
      ,abtest                         STRING COMMENT '实验信息'
      ,ctr_model_name                 STRING COMMENT '对应原来的modelname'
      ,cvr_model_name                 STRING COMMENT 'cvr/dcvr modelname'
      ,ctr                            STRING COMMENT '实验ctr'
      ,cvr                            DOUBLE COMMENT '转化率打分'
      ,ctr_raw                        DOUBLE COMMENT '校准之前的原始ctr值'
      ,cvr_raw                        DOUBLE COMMENT '校准之前的原始cvr值'
      ,dbr_raw                        DOUBLE COMMENT '校准前的预估下载率'
      ,dbr                            DOUBLE COMMENT '预估下载率'
      ,ecpm                           DOUBLE COMMENT 'ecpm'
      ,ecpm_raw                       DOUBLE COMMENT '扶持前ecpm'
      ,ltv_ori                        DOUBLE COMMENT '原始模型预估ltv'
      ,ltv                            DOUBLE COMMENT '校准后的ltv'
      ,ltv_raw                        DOUBLE COMMENT '对数还原、修正模型打分后的Itv'
      ,roas_ltv_model_name            STRING COMMENT '模型名'
      ,cost                           INT COMMENT '定价'
      ,promotion_type                 STRING COMMENT '推广目的'
      ,retarget_coef                  DOUBLE COMMENT 'retarget系数'
      ,retention_score                STRING COMMENT '次留打分'
      ,retention_model_name           STRING COMMENT '次留模型'
      ,ps_version                     STRING COMMENT 'ps版本号'
      ,sdk_version                    STRING COMMENT 'SDK版本'
      ,sdk_version_int                STRING COMMENT 'sdk版本号'
      ,cost_type                      STRING COMMENT '广告结算方式'
      ,is_offline_ad                  STRING COMMENT '0-在线、1-离线'
      ,show_ts                        BIGINT COMMENT '广告曝光时时间戳'
      ,resp_ts                        STRING COMMENT '广告响应时时间戳'
      ,show_dh                        STRING COMMENT 'show_dh'
      ,resp_dh                        STRING COMMENT 'resp_dh'
      ,is_cheating                    STRING COMMENT '1-作弊、0-正常'
      ,ad_package_name                STRING COMMENT '投放产品包名'
      ,click_ts                       BIGINT COMMENT '点击时间'
      ,click_id                       STRING COMMENT '点击id'
      ,image_width                    STRING COMMENT '点击时素材宽'
      ,image_height                   STRING COMMENT '点击时的素材高'
      ,app_version                    STRING COMMENT 'app版本号'
      ,second_price                   DOUBLE COMMENT '竞价二价'
      ,ratio                          DOUBLE COMMENT '分成比例'
      ,price                          DOUBLE COMMENT 'CPC或CPM出价'
      ,price_v2                       DOUBLE COMMENT '出价，不存在时置为0'
      ,adv_seat_type                  STRING COMMENT '广告位类型'
      ,data_src                       STRING COMMENT '用于区分数据来源 1-三方、2-联运、3-JS布码、4-ps归因、5-movicebox、6-工具2334广告主、7-中小客户广告主'
      ,exp_no                         STRING COMMENT '转化表的AB实验信息'
      ,transform_target_cn            STRING COMMENT '转化目标'
      ,click_label                    BIGINT COMMENT '1-点击表，0-非点击表'
      ,dld_label                      BIGINT COMMENT '1-下载表，0-非下载表'
      ,conv_label_active              BIGINT COMMENT '激活转化label'
      ,conv_label_retain              BIGINT COMMENT '次留转化label'
      ,conv_label_register            BIGINT COMMENT '注册转化label'
      ,conv_label_first_pay           BIGINT COMMENT '首次付费转化label'
      ,conv_label_pay                 BIGINT COMMENT '付费转化label'
      ,conv_label_apply_loan          BIGINT COMMENT '金融申贷转化label'
      ,conv_label_issue_loan          BIGINT COMMENT '金融放款转化label'
      ,dld_ts                         BIGINT COMMENT '加入下载事件时间戳'
      ,conv_ts_active                 BIGINT COMMENT '激活事件时间戳'
      ,conv_ts_retain                 BIGINT COMMENT '次留事件时间戳'
      ,conv_ts_register               BIGINT COMMENT '注册事件时间戳'
      ,conv_ts_first_pay              BIGINT COMMENT '首次付费事件时间戳'
      ,conv_ts_pay                    BIGINT COMMENT '付费事件时间戳'
      ,conv_ts_apply_loan             BIGINT COMMENT '金融申贷事件时间戳'
      ,conv_ts_issue_loan             BIGINT COMMENT '金融放款事件时间戳'
      ,tracking_log_platform          STRING COMMENT '0-eagllwin、1-adx'
      ,show_label                     BIGINT COMMENT '1-曝光，0-非曝光'
      ,ps_package_name                STRING COMMENT 'ps包名'
      ,is_effective_show              BIGINT COMMENT '有效曝光'
      ,product_id                     STRING COMMENT '商品id字段'
      ,show_log_dh                    STRING COMMENT '曝光落表时间'
      ,click_log_dh                   STRING COMMENT '点击落表的dh'
      ,dld_log_dh                     STRING COMMENT '下载落表的dh'
      ,conv_log_dh                    STRING COMMENT '转化表中落表dh'
      ,ad_source                      STRING COMMENT '兜底广告标识0-实时，1-缓存，2-兜底'
      ,transform_target_bill_v2       DOUBLE COMMENT '转化目标出价'
      ,cur_bill_coef                  DOUBLE COMMENT '计费系数'
      ,mcc                            STRING COMMENT '国家'
      ,country_zh                     STRING COMMENT '国家'
  )
  PARTITIONED BY 
  (
      dh                              STRING COMMENT '日期/小时分区，格式yyyyMMddHH'
  )
  LIFECYCLE 90;
分区信息:
  分区字段: dh
  分区类型: STRING
  分区说明: 日期/小时分区，格式yyyyMMddHH
核心字段详解:
  request_id:
    字段名: request_id
    数据类型: STRING
    业务含义: 广告请求ID，唯一标识一次广告请求
    示例值:
    - 'req_20240101120000_abc123'
    使用注意: 关联曝光、点击、下载、转化数据的关键字段
  trigger_id:
    字段名: trigger_id
    数据类型: STRING
    业务含义: 触发ID，标识广告触发事件
    示例值:
    - 'trig_20240101120000_xyz789'
    使用注意: 用于关联曝光和点击数据
  show_id:
    字段名: show_id
    数据类型: STRING
    业务含义: 曝光ID，唯一标识一次广告曝光
    示例值:
    - 'show_20240101120000_def456'
    使用注意: 曝光去重和关联转化的关键字段
  is_inapp_ad:
    字段名: is_inapp_ad
    数据类型: STRING
    业务含义: 是否内置广告，0-否，1-是
    示例值:
    - '0'
    - '1'
    使用注意: 区分内置广告和非内置广告
  gaid:
    字段名: gaid
    数据类型: STRING
    业务含义: 用户设备GAID(Google Advertising ID)，用于用户识别
    示例值:
    - 'a1b2c3d4-e5f6-7890-abcd-ef1234567890'
    使用注意: 用户隐私标识，需合规使用
  app_id:
    字段名: app_id
    数据类型: STRING
    业务含义: 媒体应用ID，标识广告展示的应用
    示例值:
    - 'app_12345'
    使用注意: 关联媒体应用维度表
  code_seat_id:
    字段名: code_seat_id
    数据类型: STRING
    业务含义: 媒体代码位ID，标识广告展示位置
    示例值:
    - 'seat_67890'
    使用注意: 关联代码位维度表
  code_seat_type:
    字段名: code_seat_type
    数据类型: STRING
    业务含义: 代码位类型，与code_type字段含义相同
    示例值:
    - '1'
    - '2'
    使用注意: 1-native，2-banner，3-插屏，4-开屏等
  brand:
    字段名: brand
    数据类型: STRING
    业务含义: 设备品牌，如itel、infinix、tecno等
    示例值:
    - 'tecno'
    - 'samsung'
    使用注意: 设备品牌标准化后的值
  model:
    字段名: model
    数据类型: STRING
    业务含义: 客户端手机型号
    示例值:
    - 'CAMON 20'
    使用注意: ''
  os_type:
    字段名: os_type
    数据类型: STRING
    业务含义: 操作系统类型
    示例值:
    - 'Android'
    - 'iOS'
    使用注意: ''
  ad_creative_id:
    字段名: ad_creative_id
    数据类型: STRING
    业务含义: 广告创意ID，标识展示的广告创意
    示例值:
    - 'creative_12345'
    使用注意: 关联创意维度表
  ad_group_id:
    字段名: ad_group_id
    数据类型: STRING
    业务含义: 广告组ID
    示例值:
    - 'group_67890'
    使用注意: 关联广告组维度表
  ad_plan_id:
    字段名: ad_plan_id
    数据类型: STRING
    业务含义: 广告计划ID
    示例值:
    - 'plan_11111'
    使用注意: 关联计划维度表
  advertiser_id:
    字段名: advertiser_id
    数据类型: STRING
    业务含义: 广告主ID
    示例值:
    - 'adv_22222'
    使用注意: 关联广告主维度表
  ad_type:
    字段名: ad_type
    数据类型: INT
    业务含义: 流量类型，0-未知，1-api流量，2-sdk流量
    示例值:
    - '1'
    - '2'
    使用注意: 区分不同流量来源
  first_price:
    字段名: first_price
    数据类型: DOUBLE
    业务含义: 竞价一价，广告主实际出价
    示例值:
    - '100.5'
    使用注意: 单位：美分
  second_price:
    字段名: second_price
    数据类型: DOUBLE
    业务含义: 竞价二价，GSP机制下的第二高价
    示例值:
    - '95.0'
    使用注意: 单位：美分
  st_ecpm:
    字段名: st_ecpm
    数据类型: STRING
    业务含义: 策略助力ecpm，策略调整后的出价
    示例值:
    - '105.0'
    使用注意: 单位：美分
  op_ecpm:
    字段名: op_ecpm
    数据类型: STRING
    业务含义: 运营助力ecpm，运营调整后的出价
    示例值:
    - '110.0'
    使用注意: 单位：美分
  ee_ecpm:
    字段名: ee_ecpm
    数据类型: STRING
    业务含义: 流量探索ecpm，探索阶段的出价
    示例值:
    - '120.0'
    使用注意: 单位：美分
  cul_ecpm:
    字段名: cul_ecpm
    数据类型: STRING
    业务含义: 保育ecpm，新广告主保育阶段的出价
    示例值:
    - '115.0'
    使用注意: 单位：美分
  billing_actual_deduction_price:
    字段名: billing_actual_deduction_price
    数据类型: BIGINT
    业务含义: 计费系统实际扣费金额
    示例值:
    - '100'
    使用注意: 单位：美分
  ctr:
    字段名: ctr
    数据类型: STRING
    业务含义: 点击率模型打分，实验CTR值
    示例值:
    - '0.05'
    使用注意: 模型预估的点击率
  cvr:
    字段名: cvr
    数据类型: DOUBLE
    业务含义: 转化率模型打分
    示例值:
    - '0.02'
    使用注意: 模型预估的转化率
  ctr_raw:
    字段名: ctr_raw
    数据类型: DOUBLE
    业务含义: 校准之前的原始CTR值
    示例值:
    - '0.048'
    使用注意: 模型原始输出，未经过校准
  cvr_raw:
    字段名: cvr_raw
    数据类型: DOUBLE
    业务含义: 校准之前的原始CVR值
    示例值:
    - '0.018'
    使用注意: 模型原始输出，未经过校准
  dbr:
    字段名: dbr
    数据类型: DOUBLE
    业务含义: 预估下载率
    示例值:
    - '0.03'
    使用注意: 模型预估的下载转化率
  dbr_raw:
    字段名: dbr_raw
    数据类型: DOUBLE
    业务含义: 校准前的预估下载率
    示例值:
    - '0.028'
    使用注意: 模型原始输出
  ecpm:
    字段名: ecpm
    数据类型: DOUBLE
    业务含义: 有效千次展示成本，综合竞价和预估CTR/CVR计算
    示例值:
    - '150.0'
    使用注意: 单位：美分
  ecpm_raw:
    字段名: ecpm_raw
    数据类型: DOUBLE
    业务含义: 扶持前ecpm，未经过策略调整的原始ecpm
    示例值:
    - '140.0'
    使用注意: 单位：美分
  cost_type:
    字段名: cost_type
    数据类型: STRING
    业务含义: 广告结算方式
    示例值:
    - 'cpm'
    - 'cpc'
    - 'ocpc'
    - 'cpi'
    使用注意: cpm/cpc/ocpc/cpd/ocpd/cpi/ocpi/cpa等
  is_offline_ad:
    字段名: is_offline_ad
    数据类型: STRING
    业务含义: 是否离线广告，0-在线广告，1-离线广告
    示例值:
    - '0'
    - '1'
    使用注意: 离线广告指预加载的广告
  show_ts:
    字段名: show_ts
    数据类型: BIGINT
    业务含义: 广告曝光时间戳，毫秒级
    示例值:
    - '1704067200000'
    使用注意: 用于计算曝光到点击的时间间隔
  click_ts:
    字段名: click_ts
    数据类型: BIGINT
    业务含义: 广告点击时间戳，毫秒级
    示例值:
    - '1704067210000'
    使用注意: 用于计算点击到转化的归因时间
  show_label:
    字段名: show_label
    数据类型: BIGINT
    业务含义: 曝光标签，1-曝光事件，0-非曝光事件
    示例值:
    - '1'
    - '0'
    使用注意: 用于区分曝光和非曝光记录
  click_label:
    字段名: click_label
    数据类型: BIGINT
    业务含义: 点击标签，1-点击表，0-非点击表
    示例值:
    - '1'
    - '0'
    使用注意: 用于区分点击和非点击记录
  dld_label:
    字段名: dld_label
    数据类型: BIGINT
    业务含义: 下载标签，1-下载表，0-非下载表
    示例值:
    - '1'
    - '0'
    使用注意: 用于区分下载和非下载记录
  conv_label_active:
    字段名: conv_label_active
    数据类型: BIGINT
    业务含义: 激活转化标签，1-发生激活转化，0-未发生
    示例值:
    - '1'
    - '0'
    使用注意: 用于统计激活转化数
  conv_label_retain:
    字段名: conv_label_retain
    数据类型: BIGINT
    业务含义: 次留转化标签，1-发生次留转化，0-未发生
    示例值:
    - '1'
    - '0'
    使用注意: 用于统计次留转化数
  conv_label_register:
    字段名: conv_label_register
    数据类型: BIGINT
    业务含义: 注册转化标签，1-发生注册转化，0-未发生
    示例值:
    - '1'
    - '0'
    使用注意: 用于统计注册转化数
  conv_label_pay:
    字段名: conv_label_pay
    数据类型: BIGINT
    业务含义: 付费转化标签，1-发生付费转化，0-未发生
    示例值:
    - '1'
    - '0'
    使用注意: 用于统计付费转化数
  dld_ts:
    字段名: dld_ts
    数据类型: BIGINT
    业务含义: 加入下载事件时间戳，毫秒级
    示例值:
    - '1704067220000'
    使用注意: 用于计算下载转化时间
  conv_ts_active:
    字段名: conv_ts_active
    数据类型: BIGINT
    业务含义: 激活事件时间戳，毫秒级
    示例值:
    - '1704067230000'
    使用注意: 用于计算激活归因时间
  is_cheating:
    字段名: is_cheating
    数据类型: STRING
    业务含义: 作弊标识，1-作弊，0-正常
    示例值:
    - '0'
    - '1'
    使用注意: 用于过滤作弊流量
  data_src:
    字段名: data_src
    数据类型: STRING
    业务含义: 数据来源标识
    示例值:
    - '1'
    - '2'
    - '4'
    使用注意: 1-三方、2-联运、3-JS布码、4-ps归因、5-movicebox、6-工具2334、7-中小客户
  transform_target_cn:
    字段名: transform_target_cn
    数据类型: STRING
    业务含义: 转化目标中文描述
    示例值:
    - 激活
    - 注册
    - 付费
    使用注意: 关联广告组维度表获取
  ad_source:
    字段名: ad_source
    数据类型: STRING
    业务含义: 兜底广告标识
    示例值:
    - '0'
    - '1'
    - '2'
    使用注意: 0-实时广告，1-缓存广告，2-兜底广告
  popularize_app_install_status:
    字段名: popularize_app_install_status
    数据类型: STRING
    业务含义: 推广应用安装状态
    示例值:
    - '-1'
    - '1'
    - '2'
    - '3'
    使用注意: -1-异常，1-非下载类，2-已安装，3-未安装
常用查询场景:
  示例查询:
    场景名称: 查询指定小时的曝光点击转化数据
    SQL模板: SELECT * FROM mi_ads_dmp.dwd_ew_ads_show_res_clk_dld_conv_hi WHERE dh = '{{dh}}' LIMIT 100
    参数:
      dh: 分区值，格式yyyyMMddHH
数据质量规则:
  异常值识别: {}

数据生产逻辑:
  概述: |
    本表是广告曝光、响应、点击、下载、转化全链路明细小时表。
    通过将曝光表(dwd_ew_ads_show_res_hi)与点击下载转化表(dwd_ew_ads_clk_dld_conv_hi)进行关联，
    形成完整的广告事件链路，支持归因分析和效果追踪。
    数据粒度为单次广告事件明细，包含115个字段，覆盖设备信息、广告信息、竞价信息、模型打分、转化标签等。
  
  输入数据源:
    - mi_ads_dmp.dwd_ew_ads_show_res_hi: 曝光响应小时表，提供曝光数据
    - mi_ads_dmp.dwd_ew_ads_clk_dld_conv_hi: 点击下载转化小时表，提供点击、下载、转化数据
    - com_cdm.dim_ad_group_dd: 广告组维度表，获取转化目标信息
  
  核心处理流程:
    阶段1_曝光数据准备(ads_show):
      - 从dwd_ew_ads_show_res_hi读取近45天数据
      - 按trigger_id, request_id, ad_creative_id分区
      - 按billing_actual_deduction_price降序、show_ts升序排序
      - 取rn=1实现曝光去重
      - 添加show_label=1标识曝光事件
    
    阶段2_广告组维度关联(dd):
      - 从dim_ad_group_dd获取转化目标信息
      - 按id分区，按gmt_modified降序取最新记录
      - 关联到曝光数据获取transform_target_cn
    
    阶段3_点击数据处理(click_t):
      - 从dwd_ew_ads_clk_dld_conv_hi读取点击数据(click_label=1)
      - 按trigger_id, request_id, ad_creative_id分区
      - 使用MAX窗口函数聚合各类label
      - 按billing_actual_deduction_price降序、click_ts升序排序
      - 取rn=1实现点击去重
    
    阶段4_下载数据处理(dld_t):
      - 从dwd_ew_ads_clk_dld_conv_hi读取下载数据(click_label=0, dld_label=1)
      - 按request_id, ad_creative_id分区
      - 使用MAX窗口函数聚合各类label
      - 按billing_actual_deduction_price降序、dld_ts升序排序
      - 取rn=1实现下载去重
    
    阶段5_转化数据处理(conv_t):
      - 从dwd_ew_ads_clk_dld_conv_hi读取转化数据(click_label=0, dld_label=0)
      - 按request_id, ad_creative_id分区
      - 使用MAX窗口函数聚合各类label
      - 按billing_actual_deduction_price降序、conv_log_dh升序排序
      - 取rn=1实现转化去重
    
    阶段6_数据合并(click_dld_union):
      - 将click_t、dld_t、conv_t通过UNION ALL合并
      - 统一字段格式和命名
    
    阶段7_最终关联:
      - 将曝光数据(show_t)与合并后的点击下载转化数据关联
      - 使用LEFT JOIN关联，保留所有曝光数据
      - 关联键：trigger_id, request_id, ad_creative_id
      - 生成最终的曝光-点击-下载-转化全链路数据
  
  输出字段生成逻辑:
    - request_id~city_id: 来自曝光表或点击下载转化表
    - ad_creative_id~advertiser_id: 广告维度信息
    - first_price~billing_actual_deduction_price: 竞价计费信息
    - ctr~dbr: 模型打分信息
    - show_label~conv_label_issue_loan: 事件标签
    - show_ts~conv_ts_issue_loan: 时间戳信息
    - transform_target_cn: 来自广告组维度表
    - is_cheating: 反作弊标识
    - data_src: 数据来源标识
  
  去重逻辑说明:
    - 曝光去重：按trigger_id+request_id+ad_creative_id，取计费最高且时间最早的记录
    - 点击去重：按trigger_id+request_id+ad_creative_id，取计费最高且时间最早的记录
    - 下载去重：按request_id+ad_creative_id，取计费最高且时间最早的记录
    - 转化去重：按request_id+ad_creative_id，取计费最高且时间最早的记录
  
  时间参数说明:
    - ${last45day}: 45天前的日期
    - ${last1day}: 1天前的日期
    - dh: 小时分区，格式yyyyMMddHH

