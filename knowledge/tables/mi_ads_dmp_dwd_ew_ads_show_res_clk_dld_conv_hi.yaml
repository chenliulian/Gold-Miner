  \    ,conv_ts_pay                    BIGINT COMMENT '付费事件时间戳'\n    ,conv_ts_apply_loan\
  \             BIGINT COMMENT '金融申贷事件时间戳'\n    ,conv_ts_issue_loan             BIGINT\
