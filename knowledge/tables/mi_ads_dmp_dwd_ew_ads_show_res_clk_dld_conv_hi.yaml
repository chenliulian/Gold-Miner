  \    ,is_default_ad                  BIGINT COMMENT '是否请求打底广告'\n    ,operator_type\
  \                  INT COMMENT '运营商类型'\n    ,ip_address                     STRING\
  \ COMMENT '客户端ip'\n    ,screen_width                   INT COMMENT '屏幕宽'\n    ,screen_height\
  \                  INT COMMENT '屏幕长'\n    ,screen_density                 INT COMMENT\
  \ '屏幕密度'\n    ,national_id                    STRING COMMENT '国家ID'\n    ,state_id\
  \                       STRING COMMENT '州ID'\n    ,city_id                     \
  \   STRING COMMENT '城市ID'\n    ,ad_creative_id                 STRING COMMENT '创意id'\n\
  \    ,ad_group_id                    STRING COMMENT '广告组id'\n    ,ad_plan_id   \
  \                  STRING COMMENT '计划id'\n    ,advertiser_id                  STRING\
  \ COMMENT '广告主id'\n    ,package_name                   STRING COMMENT '应用包名'\n \
  \   ,ad_type                        INT COMMENT '流量类型，0 未知流量 1 api流量（媒体）2 sdk流量'\n\
  \    ,page_id                        STRING COMMENT '页面ID'\n    ,ssp_id        \
  \                 STRING COMMENT ''\n    ,popularize_app_install_status  STRING\
  \ COMMENT '-1:异常情况取不到是否安装 1.非下载类广告 2.已安装目标下载应用 3.未安装目标下载应用'\n    ,first_price  \
