  \ ,data_src                       STRING COMMENT '用于区分数据来源 1-三方、2-联运、3-JS布码、4-ps归因、5-movicebox、6-工具2334广告主、7-中小客户广告主'\n\
  \    ,exp_no                         STRING COMMENT '转化表的AB实验信息'\n    ,transform_target_cn\
  \            STRING COMMENT '转化目标'\n    ,click_label                    BIGINT COMMENT\
  \ '1-点击表，0-非点击表'\n    ,dld_label                      BIGINT COMMENT '1-下载表，0-非下载表'\n\
