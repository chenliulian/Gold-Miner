  \ BIGINT COMMENT '计费的扣费'\n    ,abtest                         STRING COMMENT '实验信息'\n\
  \    ,ctr_model_name                 STRING COMMENT '对应原来的modelname'\n    ,cvr_model_name\
  \                 STRING COMMENT 'cvr/dcvr modelname'\n    ,ctr                \
