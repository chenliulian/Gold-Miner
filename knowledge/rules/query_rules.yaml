# 查询规则定义
# 用于指导 Agent 生成高质量的 SQL 查询

查询规则:
  # ========== 分区规则 ==========
  必须指定分区:
    规则ID: R001
    名称: DWD表必须指定分区
    描述: 查询DWD层明细表时必须指定分区条件
    严重级别: 强制
    适用表: 
      - dwd_*
      - 所有包含 dh/dt 分区字段的表
    规则详情:
      - 必须包含 WHERE dh >= '...' AND dh <= '...'
      - 或者 WHERE dt >= '...' AND dt <= '...'
    错误示例: >
      SELECT * FROM mi_ads_dmp.dwd_ew_ads_show_res_clk_dld_conv_hi
      WHERE advertiser_id = 123
    正确示例: >
      SELECT * FROM mi_ads_dmp.dwd_ew_ads_show_res_clk_dld_conv_hi
      WHERE dh >= '2026031500' AND dh <= '2026031523'
        AND advertiser_id = 123
    违反后果: 查询会被系统拒绝或超时
    
  分区格式规范:
    规则ID: R002
    名称: 分区值格式必须正确
    描述: dh分区必须是YYYYMMDDHH格式，dt分区必须是YYYYMMDD格式
    严重级别: 强制
    正确格式:
      dh: "2026031500 - 14位"
      dt: "20260315 - 8位"
    错误格式:
      - "2026-03-15 - 带横线"
      - "2026/03/15 - 带斜线"
      - "15-Mar-2026 - 其他格式"
      
  时间范围限制:
    规则ID: R003
    名称: 单次查询时间范围限制
    描述: 为防止查询超时，限制单次查询的时间范围
    严重级别: 建议
    限制:
      DWD层: 不超过7天
      DWS层: 不超过31天
      ADS层: 不超过90天
    超出处理: 分多次查询，每次在限制范围内
    
  # ========== 性能优化规则 ==========
  先过滤后聚合:
    规则ID: R004
    名称: 聚合前先过滤数据
    描述: 在GROUP BY之前先过滤数据，减少计算量
    严重级别: 建议
    优化原则:
      - WHERE子句中尽早过滤不需要的数据
      - 对聚合字段先过滤再SUM，避免计算无效值
      - 子查询中完成过滤，外层只做聚合
    优化示例: >
      -- 优化前：先聚合所有数据再过滤
      SELECT advertiser_id, SUM(cost_field)
      FROM table
      WHERE dh >= '...' AND dh <= '...'
      GROUP BY advertiser_id
      HAVING SUM(cost_field) > 1000
      
      -- 优化后：先过滤再聚合
      SELECT advertiser_id, SUM(cost) AS total_cost
      FROM (
        SELECT advertiser_id, cost_field AS cost
        FROM table
        WHERE dh >= '...' AND dh <= '...'
          AND cost_field > 0  -- 提前过滤
      )
      GROUP BY advertiser_id
      HAVING total_cost > 1000
      
  避免SELECT星号:
    规则ID: R005
    名称: 避免使用 SELECT *
    描述: 只查询需要的字段，减少数据传输
    严重级别: 建议
    错误示例: SELECT * FROM table
    正确示例: SELECT advertiser_id, dh, cost_field FROM table
    
  大表JOIN优化:
    规则ID: R006
    名称: 大表JOIN需要谨慎
    描述: 两个大表JOIN会产生笛卡尔积，性能极差
    严重级别: 警告
    建议:
      - 先分别聚合再JOIN
      - 使用MAPJOIN提示，小表放右边
      - 确保JOIN条件有分区过滤
    优化示例: >
      WITH advertiser_spend AS (
        SELECT advertiser_id, SUM(cost_field) AS spend
        FROM dwd_table
        WHERE dh >= '2026031500'
        GROUP BY advertiser_id
      ),
      advertiser_info AS (
        SELECT advertiser_id, industry
        FROM dim_table
      )
      SELECT a.*, b.industry
      FROM advertiser_spend a
      JOIN advertiser_info b ON a.advertiser_id = b.advertiser_id
      
  # ========== 指标计算规则 ==========
  消耗统一口径:
    规则ID: R007
    名称: 消耗类指标使用统一口径
    描述: 消耗计算需根据表的字段定义选择合适的消耗字段，不同表可能使用不同字段
    严重级别: 强制
    常见消耗字段:
      - billing_actual_deduction_price: 实际扣费金额（微美元）
      - bill_should_cost: 计费系统应扣金额
      - pool_should_cost: 资金池实扣金额
      - cpm_cost/cpc_cost/cpd_cost/cpi_cost: 按结算方式分的花费
    单位转换: 微美元需除以 1e5 转为美元
    正确计算:
      总消耗: SUM(消耗字段) / 1e5
      日均消耗: AVG(日消耗)
    错误计算:
      - 使用错误的消耗字段
      - 忘记除以1e5（微美元转美元）
      - 使用MAX/MIN而不是SUM
    注意: 具体使用哪个字段需参考表结构定义
      
  CTR计算规则:
    规则ID: R008
    名称: CTR计算必须先SUM再除
    描述: CTR = SUM(click) / SUM(show)，不是AVG(click/show)
    严重级别: 强制
    正确计算: SUM(click_count) / SUM(show_count)
    错误计算: AVG(click_count / show_count)
    原因: 需要先汇总再计算比率，避免比率平均的数学错误
    示例: >
      SELECT 
        advertiser_id,
        ROUND(SUM(click_count) / SUM(show_count), 4) AS ctr
      FROM table
      GROUP BY advertiser_id
      
  CVR计算规则:
    规则ID: R009
    名称: CVR计算规则
    描述: CVR = SUM(conversion) / SUM(click)
    严重级别: 强制
    正确计算: SUM(conversion_count) / SUM(click_count)
    注意: 分母是点击数，不是展示数
    
  CPM计算规则:
    规则ID: R010
    名称: CPM计算规则
    描述: CPM = 消耗(美元) / 展示数 * 1000
    严重级别: 强制
    计算公式: SUM(消耗字段) / SUM(show_count) * 1000 / 1e5
    单位: 美元/千次展示
    注意: 消耗字段需根据表结构选择（如cpm_cost, bill_should_cost等）
    
  CPC计算规则:
    规则ID: R011
    名称: CPC计算规则
    描述: CPC = 消耗(美元) / 点击数
    严重级别: 强制
    计算公式: SUM(消耗字段) / SUM(click_count) / 1e5
    单位: 美元/点击
    注意: 消耗字段需根据表结构选择（如cpc_cost, bill_should_cost等）
    
  去重规则:
    规则ID: R012
    名称: 去重统计规则
    描述: 不同维度的去重使用不同的ID
    严重级别: 建议
    去重维度:
      按请求去重: COUNT(DISTINCT request_id)
      按广告主去重: COUNT(DISTINCT advertiser_id)
      按用户去重: COUNT(DISTINCT gaid) 或 gazj
      按广告去重: COUNT(DISTINCT ad_creative_id)
      
  # ========== 数据质量规则 ==========
  异常值检查:
    规则ID: R013
    名称: 识别异常值
    描述: 查询结果中可能存在异常值，需要识别
    严重级别: 建议
    异常类型:
      CTR异常高:
        条件: CTR > 10% 或 CTR > 行业均值3倍
        可能原因: 作弊流量、数据错误
        处理: 标记并进一步分析
      CTR异常低:
        条件: CTR < 0.1% 或 CTR < 行业均值1/10
        可能原因: 创意质量差、定向过宽
        处理: 优化建议
      消耗为0但有展示:
        可能原因: 赠送流量、数据缺失、结算延迟
        处理: 确认是否为赠送流量或检查数据完整性
      点击大于展示:
        严重级别: 高
        说明: 数据逻辑错误（不可能事件）
        处理: 必须排查数据质量问题
      转化大于点击:
        严重级别: 高
        说明: 数据逻辑错误（转化必须有点击前置）
        处理: 必须排查数据质量问题
      消耗与点击不匹配:
        说明: CPC广告有消耗但无点击，或有点击但无消耗
        处理: 检查消耗字段和点击字段的统计口径是否一致
        
  空值处理:
    规则ID: R014
    名称: 处理NULL值
    描述: 聚合函数会自动忽略NULL，但需要显式处理
    严重级别: 建议
    处理方式:
      替换为0: COALESCE(column, 0)
      替换为默认值: COALESCE(column, '未知')
      过滤NULL: WHERE column IS NOT NULL
      
  # ========== 安全规则 ==========
  防止数据泄露:
    规则ID: R015
    名称: 敏感数据保护
    描述: 避免查询中包含敏感信息
    严重级别: 强制
    敏感字段:
      - user_id: 用户唯一标识
      - device_id: 设备标识
      - ip: IP地址
      - phone: 手机号
    处理:
      - 不查询敏感字段
      - 需要时进行脱敏处理
      - 聚合后展示
      
  限制返回行数:
    规则ID: R016
    名称: 限制结果集大小
    描述: 防止返回过多数据导致系统压力
    严重级别: 建议
    限制:
      默认: LIMIT 1000
      最大: LIMIT 10000
    说明: 如需更多数据，使用分页或导出功能

  # ========== 广告组分析规则 ==========
  广告组分析必须包含关键维度:
    规则ID: R018
    名称: 广告组数据分析必须包含计费类型和转化目标
    描述: 涉及广告组数据分析时，分析结果需要带上cost_type（计费类型）和转化目标字段，以便理解投放策略和效果评估
    严重级别: 建议
    适用场景: 所有涉及广告组（ad_group_id）的数据分析查询
    关键字段:
      cost_type:
        字段名: cost_type / billing_type / price_type
        说明: 计费类型
        可选值:
          - cpm: 千次展示计费
          - cpc: 点击计费
          - ocpc: 优化点击计费
          - cpd: 下载计费
          - ocpd: 优化下载计费
          - cpi: 激活计费
          - ocpi: 优化激活计费
        获取方式: 关联 com_cdm.dim_adgroup_dd 表的 cost_type 字段
      转化目标:
        字段名: convert_goal / conversion_target / optimize_goal
        说明: 广告投放的优化目标
        可选值:
          - 激活: 优化应用激活
          - 注册: 优化用户注册
          - 付费: 优化用户付费
          - 首次付费: 优化首次付费行为
          - 金融申贷: 优化贷款申请
        获取方式: 关联 com_cdm.dim_adgroup_dd 表的 convert_goal 字段
    示例查询: >
      SELECT 
        t1.ad_group_id,
        t2.cost_type,
        t2.convert_goal,
        SUM(t1.show_cnt) AS show_cnt,
        SUM(t1.click_cnt) AS click_cnt,
        SUM(t1.cost) AS cost,
        SUM(t1.conv_cnt) AS conv_cnt
      FROM mi_ads_dmp.dwd_ew_ads_show_res_clk_dld_conv_hi t1
      LEFT JOIN com_cdm.dim_adgroup_dd t2 
        ON CAST(t1.ad_group_id AS BIGINT) = t2.id
      WHERE t1.dh >= '2026031500' AND t1.dh <= '2026031523'
        AND t1.ad_group_id = '80554'
      GROUP BY t1.ad_group_id, t2.cost_type, t2.convert_goal
    注意事项:
      - cost_type 和 convert_goal 需要从维度表获取
      - 关联条件注意类型转换（STRING vs BIGINT）
      - 如果维度表无数据，使用 COALESCE 设置默认值
      - 分析结论需要结合计费类型和转化目标解读效果

  广告漏斗分析必须包含完整链路:
    规则ID: R019
    名称: 广告投放漏斗数据分析必须包含完整节点
    描述: 进行广告投放漏斗数据分析时，需要包含从召回到转化的完整链路节点数据，以便全面评估各环节转化效率和瓶颈
    严重级别: 建议
    适用场景: 所有涉及广告投放漏斗分析、转化链路分析的查询
    完整漏斗节点:
      1. 召回 (Recall):
        字段: recall_cnt / recall_nums
        说明: 广告被召回参与竞价的次数
        数据来源: ads_strategy.dwd_ads_competition_rank_simple_hi
      2. 进入精排队列 (Rank):
        字段: rank_cnt / rank_nums
        说明: 广告进入精排阶段的次数
        数据来源: ads_strategy.dwd_ads_competition_rank_simple_hi
      3. 响应 (Response):
        字段: resp_cnt / resp_nums
        说明: 广告在竞价中胜出的次数
        数据来源: ads_strategy.dwd_ads_competition_rank_simple_hi
      4. 曝光 (Show):
        字段: show_cnt / show_pv / imp_cnt
        说明: 广告被展示的次数
        数据来源: mi_ads_dmp.dwd_ew_ads_show_res_clk_dld_conv_hi
      5. 点击 (Click):
        字段: click_cnt / click_pv / clk_cnt
        说明: 广告被点击的次数
        数据来源: mi_ads_dmp.dwd_ew_ads_show_res_clk_dld_conv_hi
      6. 下载 (Download):
        字段: dld_cnt / download_cnt
        说明: 应用被下载的次数
        数据来源: mi_ads_dmp.dwd_ew_ads_show_res_clk_dld_conv_hi
      7. 转化 (Conversion):
        字段: conv_cnt / conversion_cnt / click_conv_pv
        说明: 根据转化目标统计的转化次数
        数据来源: mi_ads_dmp.dwd_ew_ads_show_res_clk_dld_conv_hi
    关键指标计算:
      召回进精排率: rank_cnt / recall_cnt
      精排响应率: resp_cnt / rank_cnt
      响应曝光率: show_cnt / resp_cnt
      曝光点击率: click_cnt / show_cnt
      点击下载率: dld_cnt / click_cnt
      下载转化率: conv_cnt / dld_cnt
      整体转化率: conv_cnt / recall_cnt
    示例查询: >
      WITH funnel_data AS (
        -- 召回、精排、响应数据
        SELECT 
          ad_group_id,
          SUM(CAST(recall_nums AS BIGINT)) AS recall_cnt,
          SUM(CAST(rank_nums AS BIGINT)) AS rank_cnt,
          SUM(CAST(resp_nums AS BIGINT)) AS resp_cnt
        FROM ads_strategy.dwd_ads_competition_rank_simple_hi
        WHERE dh >= '2026032000' AND dh <= '2026032023'
          AND ad_group_id = '80554'
        GROUP BY ad_group_id
      ),
      conv_data AS (
        -- 曝光、点击、下载、转化数据
        SELECT 
          CAST(ad_group_id AS STRING) AS ad_group_id,
          SUM(show_pv) AS show_cnt,
          SUM(clk_pv) AS click_cnt,
          SUM(dld_pv) AS dld_cnt,
          SUM(CASE WHEN event_type LIKE '%申贷%' THEN click_conv_pv ELSE 0 END) AS conv_cnt
        FROM mi_ads_dmp.dwd_ew_ads_show_res_clk_dld_conv_hi
        WHERE dh >= '2026032000' AND dh <= '2026032023'
          AND ad_group_id = 80554
        GROUP BY CAST(ad_group_id AS STRING)
      )
      SELECT 
        f.ad_group_id,
        f.recall_cnt,
        f.rank_cnt,
        f.resp_cnt,
        c.show_cnt,
        c.click_cnt,
        c.dld_cnt,
        c.conv_cnt,
        ROUND(f.rank_cnt * 100.0 / NULLIF(f.recall_cnt, 0), 2) AS recall_to_rank_rate,
        ROUND(f.resp_cnt * 100.0 / NULLIF(f.rank_cnt, 0), 2) AS rank_to_resp_rate,
        ROUND(c.show_cnt * 100.0 / NULLIF(f.resp_cnt, 0), 2) AS resp_to_show_rate,
        ROUND(c.click_cnt * 100.0 / NULLIF(c.show_cnt, 0), 2) AS ctr,
        ROUND(c.dld_cnt * 100.0 / NULLIF(c.click_cnt, 0), 2) AS click_to_dld_rate,
        ROUND(c.conv_cnt * 100.0 / NULLIF(c.dld_cnt, 0), 2) AS dld_to_conv_rate,
        ROUND(c.conv_cnt * 100.0 / NULLIF(f.recall_cnt, 0), 2) AS overall_conv_rate
      FROM funnel_data f
      LEFT JOIN conv_data c ON f.ad_group_id = c.ad_group_id
    注意事项:
      - 不同表的时间粒度可能不同（小时/天），注意对齐
      - 注意字段类型转换（STRING vs BIGINT）
      - 转化字段需要根据具体转化目标选择（event_type过滤）
      - 使用 NULLIF 避免除零错误
      - 漏斗各环节数据可能来自不同表，需要JOIN关联
      - 分析时需要识别漏斗瓶颈环节（转化率最低的环节）

  转化统计必须匹配投放目标:
    规则ID: R020
    名称: 转化数统计必须与广告组投放目标一致
    描述: 统计转化数时需要结合广告组的投放目标（convert_goal），不同目标对应不同的转化事件，确保统计口径一致
    严重级别: 强制
    适用场景: 所有涉及转化数统计、转化率计算的查询
    投放目标与转化事件映射:
      激活目标:
        目标标识: activate / activation
        统计事件: 激活事件
        event_type过滤: LIKE '%激活%' OR LIKE '%activate%'
        SQL示例: SUM(CASE WHEN event_type LIKE '%激活%' THEN click_conv_pv ELSE 0 END)
      注册目标:
        目标标识: register / registration
        统计事件: 注册事件
        event_type过滤: LIKE '%注册%' OR LIKE '%register%'
        SQL示例: SUM(CASE WHEN event_type LIKE '%注册%' THEN click_conv_pv ELSE 0 END)
      付费目标:
        目标标识: pay / payment
        统计事件: 付费事件
        event_type过滤: LIKE '%付费%' OR LIKE '%pay%'
        SQL示例: SUM(CASE WHEN event_type LIKE '%付费%' THEN click_conv_pv ELSE 0 END)
      首次付费目标:
        目标标识: first_pay / first_payment
        统计事件: 首次付费事件
        event_type过滤: LIKE '%首次付费%' OR LIKE '%first_pay%'
        SQL示例: SUM(CASE WHEN event_type LIKE '%首次付费%' THEN click_conv_pv ELSE 0 END)
      金融申贷目标:
        目标标识: apply_loan / loan_application / financial_loan
        统计事件: 金融申贷事件
        event_type过滤: LIKE '%申贷%' OR LIKE '%apply_loan%'
        SQL示例: SUM(CASE WHEN event_type LIKE '%申贷%' THEN click_conv_pv ELSE 0 END)
    通用统计方法:
      黄金眼底表(com_cdm_dws_tracker_ad_cpc_cost_hi):
        方法: 基于 event_type 和 click_conv_pv 两个字段统计
        SQL模板: |
          SUM(CASE 
            WHEN event_type LIKE '%{目标关键词}%' 
            THEN click_conv_pv 
            ELSE 0 
          END) AS conv_cnt
    注意事项:
      - 必须先确认广告组的convert_goal再确定统计哪个转化事件
      - 不同广告组可能有不同的转化目标，不能统一统计
      - event_type匹配时使用LIKE进行模糊匹配，因为可能有前缀/后缀
      - 计算转化率时，分子分母的时间范围必须一致
      - 如果广告组目标不明确，需要同时统计多个转化事件供分析
      - 金融申贷类广告需特别注意区分"申贷"、"授信"、"借款"等不同事件

  # ========== ODPS SQL 语法规则 ==========
  避免使用CROSS JOIN:
    规则ID: R021
    名称: 禁止使用 CROSS JOIN，使用子查询方式替代
    描述: ODPS SQL 不支持 CROSS JOIN（笛卡尔积），需要使用子查询或 JOIN ON 1=1 方式替代
    严重级别: 强制
    适用场景: 所有需要生成笛卡尔积的场景
    错误示例: >
      -- 错误的 CROSS JOIN 用法
      SELECT a.*, b.*
      FROM table_a a
      CROSS JOIN table_b b
    正确示例: >
      -- 方法1：使用子查询生成笛卡尔积
      SELECT a.*, b.*
      FROM (
        SELECT * FROM table_a
      ) a
      JOIN (
        SELECT * FROM table_b
      ) b
      ON 1=1
      
      -- 方法2：使用 CTE 方式
      WITH a AS (SELECT * FROM table_a),
           b AS (SELECT * FROM table_b)
      SELECT a.*, b.*
      FROM a JOIN b ON 1=1
    错误信息: "ODPS-0130071: Semantic analysis exception - CROSS JOIN is not supported"
    解决方案: 将 CROSS JOIN 改为 JOIN ON 1=1，并使用子查询或 CTE 方式包装表
    注意事项:
      - ODPS 明确不支持 CROSS JOIN 语法
      - 使用 JOIN ON 1=1 可以实现笛卡尔积效果
      - 子查询或 CTE 包装是必要的，直接用表名 JOIN ON 1=1 可能仍报错
      - 笛卡尔积会产生大量数据，务必确认业务逻辑需要
      
  ORDER_BY必须带LIMIT:
    规则ID: R017
    名称: ORDER BY 必须配合 LIMIT 使用
    描述: ODPS SQL 中，使用 ORDER BY 排序时必须同时指定 LIMIT 子句，否则查询会报错
    严重级别: 强制
    适用场景: 所有使用 ORDER BY 的查询
    错误示例: >
      SELECT advertiser_id, SUM(cost) AS total_cost
      FROM table
      WHERE dh >= '2026031500'
      GROUP BY advertiser_id
      ORDER BY total_cost DESC
    正确示例: >
      SELECT advertiser_id, SUM(cost) AS total_cost
      FROM table
      WHERE dh >= '2026031500'
      GROUP BY advertiser_id
      ORDER BY total_cost DESC
      LIMIT 100
    错误信息: "ODPS-0130071: Semantic analysis exception - ORDER BY must be used with a LIMIT clause"
    解决方案: 在 ORDER BY 子句后添加 LIMIT 限制返回行数
    注意事项:
      - 如果不确定需要多少条，使用 LIMIT 1000 作为默认值
      - 如需全部数据，考虑不使用 ORDER BY，或在外层查询中排序
      - 分页查询时使用 LIMIT offset, count 格式

规则应用优先级:
  强制级: 必须遵守，违反会导致查询失败或错误
  警告级: 强烈建议遵守，违反可能导致性能问题
  建议级: 推荐遵守，可以优化查询质量和性能
