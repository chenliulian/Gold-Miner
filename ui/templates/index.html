<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoldMiner - 数据智能助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-sidebar: #ffffff;
            --bg-hover: #f0f0f2;
            --bg-active: #e8e8eb;
            --accent-primary: #4f46e5;
            --accent-hover: #4338ca;
            --accent-light: #e0e7ff;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --border-color: #e5e7eb;
            --border-light: #f3f4f6;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent-primary), #7c3aed);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .new-chat-btn {
            margin: 16px 20px;
            padding: 12px 16px;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .nav-section {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }

        .nav-section-title {
            padding: 12px 8px 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            margin: 2px 0;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--accent-light);
            color: var(--accent-primary);
            font-weight: 500;
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .user-status {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            height: 64px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .header-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        /* Content Area */
        .content-area {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .page {
            display: none;
            height: 100%;
            overflow-y: auto;
        }

        .page.active {
            display: flex;
            flex-direction: column;
        }

        /* Chat Page */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .welcome-section {
            text-align: center;
            padding: 60px 20px;
        }

        .welcome-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .welcome-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            max-width: 600px;
            margin: 0 auto;
        }

        .quick-action-btn {
            padding: 12px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quick-action-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            box-shadow: var(--shadow-sm);
        }

        .message {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message-avatar.user {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }

        .message-avatar.assistant {
            background: linear-gradient(135deg, var(--accent-primary), #7c3aed);
        }

        .message-content {
            flex: 1;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 16px;
            box-shadow: var(--shadow-sm);
        }

        .message-content.user {
            background: var(--accent-light);
        }

        /* Log Message Styles */
        .log-message .message-content {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }

        .log-header {
            font-weight: 600;
            color: var(--accent-primary);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .log-content {
            max-height: 300px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .log-line {
            padding: 4px 0;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-light);
        }

        .log-line:last-child {
            border-bottom: none;
        }

        .log-line:hover {
            background: var(--bg-hover);
        }

        /* Collapsible Log Styles */
        .log-collapsible {
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            margin: 8px 0;
            overflow: hidden;
        }

        .log-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: #f8f9fa;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        .log-toggle:hover {
            background: #e9ecef;
        }

        .log-toggle-left {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .log-toggle-icon {
            font-size: 12px;
            transition: transform 0.2s;
            color: var(--text-secondary);
        }

        .log-toggle-icon.expanded {
            transform: rotate(90deg);
        }

        .log-count {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-secondary);
            padding: 2px 8px;
            border-radius: 12px;
        }

        .log-content-wrapper {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: var(--bg-secondary);
        }

        .log-content-wrapper.expanded {
            max-height: 400px;
            overflow-y: auto;
        }

        .log-content-inner {
            padding: 12px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        /* Collapsible SQL Styles */
        .sql-collapsible {
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            margin: 16px 0;
            overflow: hidden;
        }

        .sql-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #f0f4f8;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        .sql-toggle:hover {
            background: #e2e8f0;
        }

        .sql-toggle-left {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 600;
        }

        .sql-toggle-icon {
            font-size: 12px;
            transition: transform 0.2s;
            color: var(--text-secondary);
        }

        .sql-toggle-icon.expanded {
            transform: rotate(90deg);
        }

        .sql-content-wrapper {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: #f8fafc;
        }

        .sql-content-wrapper.expanded {
            max-height: 500px;
            overflow-y: auto;
        }

        .sql-content-inner {
            padding: 16px;
        }

        .sql-block {
            background: #1e293b;
            color: #e2e8f0;
            padding: 16px;
            border-radius: var(--radius-md);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            overflow-x: auto;
            white-space: pre;
            word-wrap: normal;
            margin: 0;
        }

        .sql-block code {
            background: transparent;
            color: inherit;
            padding: 0;
            font-family: inherit;
        }

        /* SQL Syntax Highlighting */
        .sql-keyword {
            color: #c678dd;
            font-weight: 600;
        }

        .sql-string {
            color: #98c379;
        }

        .sql-number {
            color: #d19a66;
        }

        .sql-comment {
            color: #5c6370;
            font-style: italic;
        }

        /* SQL Copy Button */
        .sql-copy-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
            margin-left: 8px;
        }

        .sql-copy-btn:hover {
            background: #2563eb;
        }

        .sql-info {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            font-size: 13px;
            color: var(--text-secondary);
        }

        .sql-info-item {
            margin: 4px 0;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-primary);
            white-space: pre-wrap;
        }

        .message-time {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* Input Area */
        .input-area {
            padding: 20px 24px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .input-box {
            width: 100%;
            min-height: 56px;
            max-height: 200px;
            padding: 16px 56px 16px 20px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            font-size: 15px;
            line-height: 1.5;
            color: var(--text-primary);
            resize: none;
            outline: none;
            transition: all 0.2s;
        }

        .input-box:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .input-box::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            position: absolute;
            right: 8px;
            bottom: 8px;
            width: 40px;
            height: 40px;
            background: var(--accent-primary);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .input-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            padding: 0 4px;
        }

        .toolbar-btn {
            padding: 6px 12px;
            background: transparent;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .toolbar-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        /* Skills Page */
        .skills-page {
            padding: 24px;
        }

        .page-header-section {
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            max-width: 1200px;
        }

        .skill-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 20px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .skill-card:hover {
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .skill-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .skill-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-light);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .skill-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .skill-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Tables Section */
        .tables-section {
            margin-top: 32px;
        }

        .section-divider {
            height: 1px;
            background: var(--border-color);
            margin: 32px 0;
        }

        /* Memory Page */
        .memory-page {
            padding: 24px;
        }

        .memory-list {
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .memory-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px;
        }

        .memory-time {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .memory-content {
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* Learnings Page */
        .learnings-page {
            padding: 24px;
        }

        .learnings-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .learning-tab {
            padding: 8px 16px;
            background: transparent;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .learning-tab:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .learning-tab.active {
            background: var(--accent-light);
            color: var(--accent-primary);
            font-weight: 500;
        }

        /* Status Indicators */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: #d1fae5;
            color: #065f46;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
        }

        /* Loading State */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 16px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Code blocks */
        pre {
            background: #1f2937;
            color: #e5e7eb;
            padding: 16px;
            border-radius: var(--radius-md);
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.5;
            margin: 12px 0;
        }

        code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-hover);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        pre code {
            background: transparent;
            padding: 0;
        }

        /* Table Styles - Doubao-like */
        .table-container {
            overflow-x: auto;
            overflow-y: auto;
            max-width: 100%;
            max-height: 400px;
            margin: 16px 0;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
        }

        .table-container table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 500px;
        }

        .table-container thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .table-container th {
            background: #f8f9fa;
            color: var(--text-primary);
            font-weight: 600;
            text-align: left;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .table-container td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-primary);
            vertical-align: top;
        }

        .table-container tr:hover {
            background: #f8f9fa;
        }

        .table-container tr:last-child td {
            border-bottom: none;
        }

        /* Table horizontal scroll indicator */
        .table-container::-webkit-scrollbar {
            height: 6px;
            width: 6px;
        }

        .table-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .table-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .table-container::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Table caption/title */
        .table-caption {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }
    </style>
</head>
<body>

        <!-- Main Content -->
        <main class="main-content">

            <header class="header">

                <div class="header-actions">
                    <span class="status-badge">

                    </span>
                    <button class="header-btn" onclick="clearChat()">清空对话</button>
                </div>
            </header>

            <!-- Content Area -->
            <div class="content-area">
                <!-- Chat Page -->
                <div id="page-chat" class="page active">
                    <div class="chat-container" id="chat-messages">
                        <div class="welcome-section">
                            <h2 class="welcome-title">👋 你好，我是 GoldMiner</h2>
                            <p class="welcome-subtitle">你的数据智能助手，可以帮助你分析数据、执行 SQL 查询、管理技能等</p>
                            <div class="quick-actions">

                                </button>
                                <button class="quick-action-btn" onclick="sendQuickMessage('查看可用数据表')">
                                    📋 查看数据表

                            </button>

                <!-- Skills Page -->
                <div id="page-skills" class="page skills-page">
                    <div class="page-header-section">

                    </div>
                    <div class="skills-grid" id="skills-list">

                    <div class="section-divider"></div>

                    <div class="page-header-section">

                        <button class="learning-tab" onclick="switchLearningTab('errors', this)">错误记录</button>
                        <button class="learning-tab" onclick="switchLearningTab('features', this)">功能请求</button>
                    </div>

    <script>
        let currentPage = 'chat';
        let isProcessing = false;
        let currentLearningTab = 'learnings';

        // 页面切换
        function switchPage(page, element) {
            currentPage = page;
            
            // 更新页面显示
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            
            // 更新导航高亮
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if (element) {
                element.classList.add('active');
            }
            
            // 更新标题
            const titles = {
                'chat': '对话',
                'skills': '技能模块',
                'memory': '记忆库',
                'learnings': '学习数据'
            };
            document.getElementById('page-title').textContent = titles[page];
            
            // 加载对应数据
            if (page === 'skills') {
                loadSkills();
                loadTables();
            }
            if (page === 'memory') loadMemory();
            if (page === 'learnings') loadLearnings();
        }

        // 发送消息 - 使用流式输出
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            
            if (!message || isProcessing) return;
            
            addMessage(message, 'user');
            input.value = '';
            input.style.height = 'auto';
            
            isProcessing = true;
            updateSendButton();
            
            // 创建日志消息容器
            const logContainer = addLogMessage();
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, stream: true })
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = '';
                let hasReceivedContent = false;
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                
                                if (data.type === 'status' || data.type === 'log') {
                                    // 更新日志
                                    appendLog(logContainer, data.content);
                                } else if (data.type === 'message' && data.role === 'assistant') {
                                    // 最终响应
                                    fullResponse = data.content;
                                    hasReceivedContent = true;
                                } else if (data.type === 'error') {
                                    appendLog(logContainer, '错误: ' + data.content);
                                } else if (data.type === 'done') {
                                    // 完成
                                }
                            } catch (e) {
                                // 忽略解析错误
                            }
                        }
                    }
                }
                
                // 完成日志记录（折叠日志，保留供用户查看）
                const success = hasReceivedContent;
                finalizeLog(logContainer, success);
                
                // 显示最终结果
                if (hasReceivedContent && fullResponse) {
                    addMessage(fullResponse, 'assistant');
                } else {
                    addMessage('任务执行完成', 'assistant');
                }
                
            } catch (error) {
                // 完成日志记录（标记为失败）
                finalizeLog(logContainer, false);
                addMessage('网络错误，请稍后重试: ' + error.message, 'assistant');
            } finally {
                isProcessing = false;
                updateSendButton();
            }
        }
        
        // 添加日志消息容器（可折叠）
        function addLogMessage() {
            const container = document.getElementById('chat-messages');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message log-message';
            messageDiv.id = 'log-' + Date.now();
            
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            
            messageDiv.innerHTML = `
                <div class="message-avatar assistant">◈</div>
                <div class="message-content assistant">
                    <div class="log-collapsible">
                        <div class="log-toggle" onclick="toggleLog(this)">
                            <div class="log-toggle-left">
                                <span class="log-toggle-icon">▶</span>
                                <span>🔄 执行日志</span>
                            </div>
                            <span class="log-count">0 条</span>
                        </div>
                        <div class="log-content-wrapper">
                            <div class="log-content-inner"></div>
                        </div>
                    </div>
                    <div class="message-time">${time}</div>
                </div>
            `;
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
            
            return messageDiv;
        }
        
        // 切换日志展开/折叠
        function toggleLog(toggleElement) {
            const icon = toggleElement.querySelector('.log-toggle-icon');
            const wrapper = toggleElement.nextElementSibling;
            
            icon.classList.toggle('expanded');
            wrapper.classList.toggle('expanded');
        }
        
        // 追加日志内容
        function appendLog(logContainer, text) {
            const logInner = logContainer.querySelector('.log-content-inner');
            const logCount = logContainer.querySelector('.log-count');
            
            if (logInner) {
                const line = document.createElement('div');
                line.className = 'log-line';
                line.textContent = text;
                logInner.appendChild(line);
                
                // 更新日志计数
                const lines = logInner.querySelectorAll('.log-line');
                if (logCount) {
                    logCount.textContent = lines.length + ' 条';
                }
                
                // 限制日志行数（保留最新的100条）
                if (lines.length > 100) {
                    lines[0].remove();
                }
                
                // 如果日志已展开，滚动到底部
                const wrapper = logContainer.querySelector('.log-content-wrapper');
                if (wrapper && wrapper.classList.contains('expanded')) {
                    wrapper.scrollTop = wrapper.scrollHeight;
                }
                
                // 滚动消息容器到底部
                const container = document.getElementById('chat-messages');
                container.scrollTop = container.scrollHeight;
            }
        }
        
        // 完成日志记录（将日志折叠起来）
        function finalizeLog(logContainer, success = true) {
            const toggle = logContainer.querySelector('.log-toggle');
            const icon = toggle.querySelector('.log-toggle-icon');
            const wrapper = logContainer.querySelector('.log-content-wrapper');
            const leftText = toggle.querySelector('.log-toggle-left span:last-child');
            
            // 更新标题
            if (leftText) {
                leftText.textContent = success ? '✅ 执行完成（点击展开查看日志）' : '❌ 执行失败（点击展开查看日志）';
            }
            
            // 确保日志是折叠状态
            icon.classList.remove('expanded');
            wrapper.classList.remove('expanded');
        }

        // 添加快捷消息
        function sendQuickMessage(message) {
            document.getElementById('user-input').value = message;
            sendMessage();
        }

        // 添加消息到聊天区
        function addMessage(text, sender) {
            const container = document.getElementById('chat-messages');
            
            // 隐藏欢迎区域
            const welcome = container.querySelector('.welcome-section');
            if (welcome) welcome.style.display = 'none';
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            
            // 处理文本中的表格
            const processedText = sender === 'assistant' ? processMessageText(text) : escapeHtml(text).replace(/\n/g, '<br>');
            
            messageDiv.innerHTML = `
                <div class="message-avatar ${sender}">${sender === 'user' ? '👤' : '◈'}</div>
                <div class="message-content ${sender}">
                    <div class="message-text">${processedText}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 解析 Markdown 表格
        function parseMarkdownTable(text) {
            const lines = text.split('\n');
            const tables = [];
            let currentTable = null;
            let tableStart = -1;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                // 检测表格行 (以 | 开头和结尾)
                if (line.startsWith('|') && line.endsWith('|')) {
                    if (currentTable === null) {
                        currentTable = [];
                        tableStart = i;
                    }
                    currentTable.push(line);
                } else if (currentTable !== null) {
                    // 表格结束
                    if (currentTable.length >= 2) {
                        tables.push({
                            start: tableStart,
                            end: i,
                            rows: currentTable
                        });
                    }
                    currentTable = null;
                }
            }

            // 处理文件末尾的表格
            if (currentTable !== null && currentTable.length >= 2) {
                tables.push({
                    start: tableStart,
                    end: lines.length,
                    rows: currentTable
                });
            }

            return tables;
        }

        // 渲染表格为 HTML
        function renderTable(rows) {
            if (rows.length < 2) return null;

            // 解析表头
            const headerRow = rows[0];
            const headers = headerRow.split('|').slice(1, -1).map(h => h.trim()).filter(h => h);

            // 跳过分隔行 (第二行通常是 |---|---|)
            let dataStartIndex = 1;
            if (rows[1].includes('---') || rows[1].includes(':--')) {
                dataStartIndex = 2;
            }

            // 解析数据行
            const dataRows = [];
            for (let i = dataStartIndex; i < rows.length; i++) {
                const cells = rows[i].split('|').slice(1, -1).map(c => c.trim());
                if (cells.some(c => c)) {
                    dataRows.push(cells);
                }
            }

            if (headers.length === 0 || dataRows.length === 0) return null;

            // 生成 HTML
            let html = '<div class="table-container"><table>';
            
            // 表头
            html += '<thead><tr>';
            headers.forEach(header => {
                html += `<th>${escapeHtml(header)}</th>`;
            });
            html += '</tr></thead>';

            // 表体
            html += '<tbody>';
            dataRows.forEach(row => {
                html += '<tr>';
                row.forEach((cell, index) => {
                    html += `<td>${escapeHtml(cell)}</td>`;
                });
                // 补齐列数
                for (let i = row.length; i < headers.length; i++) {
                    html += '<td></td>';
                }
                html += '</tr>';
            });
            html += '</tbody></table></div>';

            return html;
        }

        // 处理文本中的表格和SQL代码块
        function processMessageText(text) {
            // 首先处理SQL代码块（在Markdown表格之前处理）
            text = processSqlBlocks(text);
            
            // 检查是否包含SQL折叠组件HTML，如果包含需要特殊处理
            const hasSqlCollapsible = text.includes('<div class="sql-collapsible">');
            
            const tables = parseMarkdownTable(text);
            if (tables.length === 0 && !hasSqlCollapsible) {
                return escapeHtml(text).replace(/\n/g, '<br>');
            }

            let result = '';
            let lastIndex = 0;
            
            // 如果包含SQL折叠组件，使用基于HTML标签的分割方式
            if (hasSqlCollapsible) {
                // 分割文本：保留SQL组件HTML，转义其他文本
                const parts = text.split(/(<div class="sql-collapsible">[\s\S]*?<\/div>\s*<\/div>\s*<\/div>)/);
                
                parts.forEach(part => {
                    if (part.startsWith('<div class="sql-collapsible">')) {
                        // 保留SQL组件HTML
                        result += part;
                    } else {
                        // 转义普通文本
                        const lines = part.split('\n');
                        let textResult = '';
                        let textLastIndex = 0;
                        
                        // 处理表格
                        const textTables = parseMarkdownTable(part);
                        if (textTables.length > 0) {
                            textTables.forEach(table => {
                                const beforeTable = lines.slice(textLastIndex, table.start).join('\n');
                                if (beforeTable.trim()) {
                                    textResult += escapeHtml(beforeTable).replace(/\n/g, '<br>') + '<br>';
                                }
                                
                                const tableHtml = renderTable(table.rows);
                                if (tableHtml) {
                                    textResult += tableHtml;
                                } else {
                                    textResult += escapeHtml(table.rows.join('\n')).replace(/\n/g, '<br>');
                                }
                                
                                textLastIndex = table.end;
                            });
                            
                            const afterTable = lines.slice(textLastIndex).join('\n');
                            if (afterTable.trim()) {
                                textResult += '<br>' + escapeHtml(afterTable).replace(/\n/g, '<br>');
                            }
                        } else {
                            textResult = escapeHtml(part).replace(/\n/g, '<br>');
                        }
                        
                        result += textResult;
                    }
                });
                
                return result;
            }
            
            // 原有逻辑（不含SQL组件时）
            const lines = text.split('\n');
            tables.forEach(table => {
                // 添加表格前的文本
                const beforeTable = lines.slice(lastIndex, table.start).join('\n');
                if (beforeTable.trim()) {
                    result += escapeHtml(beforeTable).replace(/\n/g, '<br>') + '<br>';
                }

                // 添加表格
                const tableHtml = renderTable(table.rows);
                if (tableHtml) {
                    result += tableHtml;
                } else {
                    result += escapeHtml(table.rows.join('\n')).replace(/\n/g, '<br>');
                }

                lastIndex = table.end;
            });

            // 添加最后一个表格后的文本
            const afterTable = lines.slice(lastIndex).join('\n');
            if (afterTable.trim()) {
                result += '<br>' + escapeHtml(afterTable).replace(/\n/g, '<br>');
            }

            return result;
        }

        // 处理SQL代码块，转换为可折叠组件
        function processSqlBlocks(text) {
            let result = text;
            let sqlIndex = 0;
            const sqlBlocks = [];
            
            // 1. 匹配 ```sql ... ``` 代码块（支持换行或不换行）
            const sqlBlockRegex = /```sql\s*\n?([\s\S]*?)```/g;
            let match;
            while ((match = sqlBlockRegex.exec(text)) !== null) {
                sqlBlocks.push({
                    fullMatch: match[0],
                    sql: match[1].trim(),
                    index: match.index,
                    type: 'codeblock'
                });
            }
            
            // 2. 匹配以 "本次跑数 SQL" 或类似标题开头的 SQL 代码块（不带 ```sql 标记）
            // 匹配模式：标题行 + 换行 + SQL语句（以 WITH/SELECT/INSERT/UPDATE/DELETE 开头，以分号或空行结束）
            const sqlHeaderPatterns = [
                /(?:##?\s*)?(?:本次跑数 SQL|执行 SQL|SQL 代码|SQL 查询|可复用 SQL)[\s\S]*?\n(WITH\s+[\s\S]*?)(?:\n\n|\n##|\n[A-Z]|$)/gi,
                /(?:##?\s*)?(?:本次跑数 SQL|执行 SQL|SQL 代码|SQL 查询|可复用 SQL)[\s\S]*?\n(SELECT\s+[\s\S]*?)(?:\n\n|\n##|\n[A-Z]|$)/gi,
                /(?:##?\s*)?(?:本次跑数 SQL|执行 SQL|SQL 代码|SQL 查询|可复用 SQL)[\s\S]*?\n(INSERT\s+[\s\S]*?)(?:\n\n|\n##|\n[A-Z]|$)/gi,
                /(?:##?\s*)?(?:本次跑数 SQL|执行 SQL|SQL 代码|SQL 查询|可复用 SQL)[\s\S]*?\n(UPDATE\s+[\s\S]*?)(?:\n\n|\n##|\n[A-Z]|$)/gi,
                /(?:##?\s*)?(?:本次跑数 SQL|执行 SQL|SQL 代码|SQL 查询|可复用 SQL)[\s\S]*?\n(DELETE\s+[\s\S]*?)(?:\n\n|\n##|\n[A-Z]|$)/gi
            ];
            
            sqlHeaderPatterns.forEach(pattern => {
                while ((match = pattern.exec(text)) !== null) {
                    // 检查这个位置是否已经被之前的匹配占用
                    const isOverlapping = sqlBlocks.some(block => 
                        (match.index >= block.index && match.index < block.index + block.fullMatch.length) ||
                        (block.index >= match.index && block.index < match.index + match[0].length)
                    );
                    
                    if (!isOverlapping) {
                        sqlBlocks.push({
                            fullMatch: match[0],
                            sql: match[1].trim(),
                            index: match.index,
                            type: 'plaintext'
                        });
                    }
                }
            });
            
            // 按索引排序，从后向前替换
            sqlBlocks.sort((a, b) => b.index - a.index);
            
            for (let i = 0; i < sqlBlocks.length; i++) {
                const block = sqlBlocks[i];
                const sqlId = 'sql-' + Date.now() + '-' + i;
                const sqlNumber = sqlBlocks.length - i;
                const sqlHtml = createSqlCollapsible(block.sql, sqlId, sqlNumber);
                
                result = result.substring(0, block.index) + sqlHtml + result.substring(block.index + block.fullMatch.length);
            }
            
            return result;
        }

        // 创建可折叠的SQL组件
        function createSqlCollapsible(sql, sqlId, sqlNumber) {
            // 格式化SQL代码，添加语法高亮
            const formattedSql = formatSqlCode(sql);
            return `<div class="sql-collapsible">
                <div class="sql-toggle" onclick="toggleSql(this)">
                    <div class="sql-toggle-left">
                        <span class="sql-toggle-icon">▶</span>
                        <span>🗄️ SQL ${sqlNumber}（点击查看）</span>
                    </div>
                    <button class="sql-copy-btn" onclick="copySql(event, '${sqlId}')" title="复制SQL">
                        📋 复制
                    </button>
                </div>
                <div class="sql-content-wrapper" id="${sqlId}">
                    <div class="sql-content-inner">
                        <pre class="sql-block"><code>${formattedSql}</code></pre>
                    </div>
                </div>
            </div>`;
        }

        // 格式化SQL代码，添加简单语法高亮
        function formatSqlCode(sql) {
            let formatted = escapeHtml(sql);
            
            // SQL关键字高亮
            const keywords = ['SELECT', 'FROM', 'WHERE', 'AND', 'OR', 'NOT', 'NULL', 'IS', 'IN', 'EXISTS', 
                             'BETWEEN', 'LIKE', 'AS', 'ON', 'JOIN', 'LEFT', 'RIGHT', 'INNER', 'OUTER', 
                             'FULL', 'CROSS', 'UNION', 'ALL', 'GROUP', 'BY', 'ORDER', 'HAVING', 'LIMIT',
                             'WITH', 'RECURSIVE', 'INSERT', 'INTO', 'VALUES', 'UPDATE', 'SET', 'DELETE',
                             'CREATE', 'TABLE', 'DROP', 'ALTER', 'INDEX', 'VIEW', 'TRIGGER', 'PROCEDURE',
                             'FUNCTION', 'CASE', 'WHEN', 'THEN', 'ELSE', 'END', 'IF', 'WHILE', 'FOR',
                             'SUM', 'COUNT', 'AVG', 'MAX', 'MIN', 'ROUND', 'COALESCE', 'CAST', 'CONVERT',
                             'DISTINCT', 'OVER', 'PARTITION', 'ROW_NUMBER', 'RANK', 'DENSE_RANK'];
            
            keywords.forEach(keyword => {
                const regex = new RegExp(`\\b${keyword}\\b`, 'gi');
                formatted = formatted.replace(regex, match => `<span class="sql-keyword">${match}</span>`);
            });
            
            // 字符串高亮
            formatted = formatted.replace(/('[^']*')/g, '<span class="sql-string">$1</span>');
            
            // 数字高亮
            formatted = formatted.replace(/\b(\d+)\b/g, '<span class="sql-number">$1</span>');
            
            // 注释高亮
            formatted = formatted.replace(/(--.*$)/gm, '<span class="sql-comment">$1</span>');
            
            return formatted;
        }

        // 复制SQL代码
        function copySql(event, sqlId) {
            event.stopPropagation(); // 防止触发折叠/展开
            const wrapper = document.getElementById(sqlId);
            const codeBlock = wrapper.querySelector('code');
            const sqlText = codeBlock.textContent;
            
            navigator.clipboard.writeText(sqlText).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '✅ 已复制';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            }).catch(err => {
                console.error('复制失败:', err);
            });
        }

        // 切换SQL展开/折叠
        function toggleSql(toggleElement) {
            const icon = toggleElement.querySelector('.sql-toggle-icon');
            const wrapper = toggleElement.nextElementSibling;
            const leftText = toggleElement.querySelector('.sql-toggle-left span:last-child');
            
            icon.classList.toggle('expanded');
            wrapper.classList.toggle('expanded');
            
            // 更新文本
            if (leftText) {
                if (wrapper.classList.contains('expanded')) {
                    leftText.textContent = leftText.textContent.replace('（点击查看）', '（点击折叠）');
                } else {
                    leftText.textContent = leftText.textContent.replace('（点击折叠）', '（点击查看）');
                }
            }
        }

        // 键盘事件
        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // 更新发送按钮状态
        function updateSendButton() {
            const btn = document.getElementById('send-btn');
            btn.disabled = isProcessing;
            btn.innerHTML = isProcessing ? '<div class="loading-spinner"></div>' : '➤';
        }

        // 新对话
        function startNewChat() {
            document.getElementById('chat-messages').innerHTML = `
                <div class="welcome-section">
                    <h2 class="welcome-title">👋 你好，我是 GoldMiner</h2>
                    <p class="welcome-subtitle">你的数据智能助手，可以帮助你分析数据、执行 SQL 查询、管理技能等</p>
                    <div class="quick-actions">
                        <button class="quick-action-btn" onclick="sendQuickMessage('分析广告组漏斗数据')">
                            📊 分析广告组漏斗
                        </button>
                        <button class="quick-action-btn" onclick="sendQuickMessage('查看可用数据表')">
                            📋 查看数据表
                        </button>
                        <button class="quick-action-btn" onclick="sendQuickMessage('执行 SQL 查询')">
                            🔍 执行 SQL
                        </button>
                        <button class="quick-action-btn" onclick="sendQuickMessage('探索表血缘关系')">
                            🔗 探索表血缘
                        </button>
                    </div>
                </div>
            `;
            switchPage('chat', document.querySelector('.nav-item'));
        }

        // 清空对话
        function clearChat() {
            if (confirm('确定要清空当前对话吗？')) {
                startNewChat();
            }
        }

        // 加载技能
        async function loadSkills() {
            const container = document.getElementById('skills-list');
            
            try {
                const response = await fetch('/api/skills');
                const data = await response.json();
                
                if (!data.success || !data.skills || data.skills.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">🛠</div>
                            <p class="empty-state-text">暂无可用技能</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = data.skills.map(skill => {
                    let desc = skill.description || '暂无描述';
                    desc = desc.replace(/[#*`\[\]]/g, '').substring(0, 120);
                    if (skill.description && skill.description.length > 120) desc += '...';
                    
                    return `
                        <div class="skill-card" onclick="useSkillByName('${skill.name}')">
                            <div class="skill-header">
                                <div class="skill-icon">🛠</div>
                                <div class="skill-title">${skill.name}</div>
                            </div>
                            <div class="skill-desc">${desc}</div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <p class="empty-state-text">加载失败</p>
                    </div>
                `;
            }
        }

        // 加载数据表
        async function loadTables() {
            const container = document.getElementById('tables-list');
            
            try {
                const response = await fetch('/api/tables');
                const data = await response.json();
                
                if (!data.success || !data.tables || data.tables.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📋</div>
                            <p class="empty-state-text">暂无数据表</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = data.tables.map(table => {
                    let desc = table.description || '暂无描述';
                    desc = desc.substring(0, 120);
                    if (table.description && table.description.length > 120) desc += '...';
                    
                    return `
                        <div class="skill-card">
                            <div class="skill-header">
                                <div class="skill-icon">📋</div>
                                <div class="skill-title">${table.name}</div>
                            </div>
                            <div class="skill-desc">${desc}</div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <p class="empty-state-text">加载失败</p>
                    </div>
                `;
            }
        }

        // 加载记忆
        async function loadMemory() {
            const container = document.getElementById('memory-content');
            
            try {
                const response = await fetch('/memory');
                const data = await response.json();
                
                if (!data.success || !data.memory || data.memory.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">🧠</div>
                            <p class="empty-state-text">暂无记忆记录</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = data.memory.map(item => `
                    <div class="memory-item">
                        <div class="memory-time">${item.timestamp || '未知时间'}</div>
                        <div class="memory-content">${item.content || item}</div>
                    </div>
                `).join('');
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <p class="empty-state-text">加载失败</p>
                    </div>
                `;
            }
        }

        // 加载学习数据
        async function loadLearnings() {
            const container = document.getElementById('learnings-content');
            
            try {
                const response = await fetch('/learnings');
                const data = await response.json();
                
                if (!data.success) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📚</div>
                            <p class="empty-state-text">暂无学习记录</p>
                        </div>
                    `;
                    return;
                }
                
                let content = '';
                if (currentLearningTab === 'learnings') content = data.learnings;
                else if (currentLearningTab === 'errors') content = data.errors;
                else if (currentLearningTab === 'features') content = data.features;
                
                if (!content || content.trim() === '') {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📚</div>
                            <p class="empty-state-text">暂无记录</p>
                        </div>
                    `;
                } else {
                    container.innerHTML = `<div class="memory-item"><div class="memory-content"><pre>${escapeHtml(content)}</pre></div></div>`;
                }
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <p class="empty-state-text">加载失败</p>
                    </div>
                `;
            }
        }

        // 切换学习标签
        function switchLearningTab(tab, element) {
            currentLearningTab = tab;
            document.querySelectorAll('.learning-tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            loadLearnings();
        }

        // 使用技能
        function useSkill() {
            switchPage('skills', document.querySelectorAll('.nav-item')[1]);
        }

        function useSkillByName(name) {
            switchPage('chat', document.querySelector('.nav-item'));
            document.getElementById('user-input').value = `使用 ${name} 技能`;
        }

        // 选择数据表
        function selectTable() {
            switchPage('skills', document.querySelectorAll('.nav-item')[1]);
        }

        // 附件功能
        function attachFile() {
            alert('附件功能开发中...');
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 自动调整输入框高度
            const input = document.getElementById('user-input');
            input.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 200) + 'px';
            });
        });
    </script>
